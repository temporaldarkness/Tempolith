- type: entity
  id: NpcStationAiFactionAttackerStaticSmart
  parent: NpcStationAiAttackerSmart
  abstract: true
  suffix: DO NOT USE
  components:
  - type: HTN
    rootTask:
      task: AttackerShuttleSmartStaticCompound
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1000
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: CleanupImmune # Factional AI cores must not despawn by mob cleanup

- type: entity
  id: NpcStationAiAttackerStaticSmartAsakim
  parent: NpcStationAiFactionAttackerStaticSmart
  suffix: ИИ, Азаким
  components:
  - type: FactionNpcAiCore
    faction: AsakimDefenceForces
  - type: NpcFactionMember
    factions:
    - AsakimDefenceForces
  - type: RadarBlip
    visibleFromOtherGrids: true
    radarColor: "#ff3db1"
    scale: 3
    shape: diamond
    gridConfig:
      color: "#ff3db1"
      shape: Square
      respectZoom: true
      rotate: true
      bounds: "-1.5,-1.5,1.5,1.5"

- type: entity
  id: NpcStationAiAttackerStaticSmartAsakimUnanchorable
  parent: NpcStationAiAttackerStaticSmartAsakim
  suffix: ИИ, Азаким, НЕ СКРУЧИВАЕМОЕ
  components:
  - type: Anchorable
    flags: None

