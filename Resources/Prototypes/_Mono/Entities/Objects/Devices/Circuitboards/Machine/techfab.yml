- type: entity
  id: MilitaryTechfabMachineCircuitboard
  parent: BaseMachineCircuitboard
  name: military multi-purpose assembler machine board
  description: A machine printed circuit board for a military assembler.
  components:
  - type: Sprite
    state: security
  - type: MachineBoard
    prototype: FactionLathe
    requirements: # Frontier
      MatterBin: 2 # Frontier stackRequirements<requirements
      Manipulator: 2 # Frontier stackRequirements<requirements
    tagRequirements:
      GlassBeaker:
        amount: 2
        defaultPrototype: Beaker

