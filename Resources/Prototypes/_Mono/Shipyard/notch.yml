# Shuttle Notes: If this ship is ever to be revised by someone else than me in the future, avoid putting pulse miners on it. It was done on purpose, as it's sister small mining shuttle will have them.
#                This shuttle is intended to be one of the cheapest yet pretty first timer's shuttle.
- type: vessel
  id: Notch
  parent: BaseVessel
  name: Нотч # Ru-Localization
  description: Небольшой утилизаторский шаттл с самым необходимым для любого начинающего старателя в секторе. Быстрый и компактный. Гордая часть коллекции гражданских космических кораблей Дрэйк Индастрис. # Ru-Localization
  price: 25900
  category: Small
  group: Shipyard
  shuttlePath: /SharedMaps/_Mono/Shuttles/notch.yml
  addComponents:
  - type: NpcFactionMember # Exodus NanoTrasen faction
    factions:
    - NanoTrasen
  guidebookPage: Null
  class:
  - Salvage
  engine:
  - Plasma

- type: gameMap
  id: Notch
  mapName: 'Нотч' # Ru-Localization
  mapPath: /SharedMaps/_Mono/Shuttles/notch.yml
  minPlayers: 0
  stations:
    Notch:
      stationProto: StandardFrontierVessel
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Нотч{1}' # Ru-Localization
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: StationJobs
          availableJobs:
            Contractor: [ 0, 0 ]
            Pilot: [ 0, 0 ]
            Mercenary: [ 0, 0 ]
