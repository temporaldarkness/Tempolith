# Seperate versions of ADS shuttles with different weights and whatnot

- type: entityTable
  id: DamagedAIShipsTableApocalypse
  table: !type:AllSelector # we need to pass a list of rules, since rules have further restrictions to consider via StationEventComp
    children:
    - id: UnknownShuttleZenithApoc
    - id: UnknownShuttleZenithEApoc
    - id: UnknownShuttleWyrmApoc
    - id: UnknownShuttleNebulaApoc
    - id: UnknownShuttleWyvernApoc
    - id: UnknownShuttleRazorNApoc
    - id: UnknownShuttleConcordXApoc # Exodus
    - id: UnknownShuttleMantarayApoc # Exodus
    - id: UnknownShuttleCrowApoc # Exodus
    - id: UnknownShuttleOmenApoc # Exodus
    - id: UnknownShuttleAzimuthApoc # Exodus-azimuth
    - id: UnknownShuttleStratostarApoc # Exodus-stratostar
    - id: UnknownShuttleZenithAApoc # Exodus

- type: entity
  parent: BaseRandomShuttleRule
  id: UnknownShuttleZenithApoc
  components:
  - type: StationEvent
    startAnnouncement: station-event-ai-shuttle-detected
    startAudio:
      path: /Audio/Misc/notice1.ogg
    weight: 7
    maxOccurrences: 6
  - type: GameRule
    minPlayers: 32
  - type: LoadMapRule
    gridPath: /Maps/_Exodus/ShuttleEvent/zenith.yml # Exodus-Tweak
  - type: GameRuleRequirements # Exodus
    requirements:
    - !type:JobGameRuleRequirement
      department: Combatant
      minDepartmentPlayers: 3

