- type: entity
  id: Magazine57mmHE
  name: "57mm HE ammo loader"
  description: "An ammunition loader containing infinite 57mm high-explosive rounds. Usable by vessel-mounted artillery pieces."
  parent: [BaseItem, RecyclableItemSteelTiny]
  components:
  - type: Tag
    tags:
    - Magazine57mm
  - type: Item
    size: Small
  - type: BallisticAmmoProvider
    infiniteUnspawned: true
    proto: 57mmCartridgeHE
    capacity: 1 # normally should hold 600
    mayTransfer: true
    whitelist:
      tags:
      - 57mmCartridge
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _Mono/Objects/SpaceArtillery/magazines.rsi
    layers:
    - state: 57mmHE
      map: [ "enum.GunVisualLayers.Base" ]
  - type: Appearance

- type: entity
  id: 57mmCartridgeHE
  name: cartridge (57mm HE)
  parent: BaseCartridge
  components:
  - type: Tag
    tags:
    - Cartridge
    - 57mmCartridge
  - type: CartridgeAmmo
    deleteOnSpawn: true
    proto: 57mmBulletHE
    muzzleFlash: MuzzleFlashEffectAk570
  - type: Sprite
    sprite: _Mono/Objects/SpaceArtillery/shells.rsi
    layers:
    - state: 57mmHE
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: StaticPrice
    price: 1
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 250
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:ExplodeBehavior
  - type: Explosive
    explosionType: Default
    maxIntensity: 100
    intensitySlope: 3
    totalIntensity: 1
  - type: ExplodeOnTrigger
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic

- type: entity
  id: MuzzleFlashEffectAk570
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 0.4
  - type: Sprite
    drawdepth: BelowMobs
    layers:
    - shader: unshaded
      map: ["enum.EffectLayers.Unshaded"]
      sprite: _Mono/Objects/ShuttleWeapons/artillery.rsi
      state: muzzle_ak570
    scale: 1,1
    offset: 0.6, 0
  - type: EffectVisuals
  - type: Tag
    tags:
    - HideContextMenu
  - type: AnimationPlayer
