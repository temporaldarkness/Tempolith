# POI grids that spawn inside specific nebula kinds at round start.
# Picked up by NebulaPoiSpawnSystem once both blob and world-end nebula generation finish.
#
# How to add a new POI:
#
# - type: nebulaPoi
#   id: NebulaPoiYourId                              # unique prototype id
#   path: Maps/_Whatever/your_grid.yml               # ResPath to the grid YAML to load
#   spawnIn:                                         # marker prototype ids of allowed nebulas
#   - NebulaBlueMarker
#   - NebulaGreenMarker
#   - NebulaPurpleMarker
#   - NebulaRedMarker
#   - NebulaDeathZoneInnerMarker
#   # (NebulaDeathZoneOuterMarker is intentionally avoided — players cannot survive there.)
#   maxCount: 1                                      # total copies across the whole map
#   duplicateAllowed: false                          # may two copies share one nebula
#   protectedRadius: 500                             # broadphase clearance (world tiles)
#   minDensity: 0.5                                  # density floor inside blob nebulas
#   maxDensity: 1.0                                  # density ceiling
#   maxSpawnDistanceFromCenter: 45000                # optional max world distance from map center; unset = no limit
#   name: "Имя на карте"                             # optional display name override
#   addComponents:                                   # optional components attached to the grid
#   - type: IFF
#     color: "#C83737"
#     flags: [HideLabel]
#   - type: SyndicateFOB
#   stationGameMap: LPBravo                          # optional, register grid as a station
#   hideWarp: true                                   # optional, station warp = admin-only
#
# Notes:
# - density semantics: 1 = nebula core, 0 = outer edge. Death zones are dense everywhere; the
#   density bounds are ignored for them.
# - protectedRadius is checked via broadphase against existing grids and other POIs placed by
#   this spawner in the same round.
# - maxSpawnDistanceFromCenter is optional. Leave it unset to allow the POI anywhere inside a
#   matching nebula. Set it to a world-tile radius to keep the POI inside that distance from
#   the map center while still requiring it to be inside the selected nebula.
# - duplicateAllowed only matters when maxCount > 1.
# - The spawner picks a random eligible nebula (spawnIn + duplicateAllowed). Different POI ids
#   may share one nebula when TryPlaceCopy finds a valid point. If 16 placement attempts fail
#   in the picked nebula, up to 4 other eligible nebulas are tried (already-attempted excluded).
# - stationGameMap is optional. Most POIs should leave it unset — the grid loads as plain
#   decoration without station bookkeeping. Set it ONLY when the POI hosts station-aware
#   machinery: shipyard consoles, cargo bounty terminals, anything calling GetOwningStation.
#   The referenced gameMap prototype must have a stations entry whose key matches its own id.
# - addComponents are applied directly to the loaded grid — NebulaPoiSpawnSystem does NOT
#   inherit from BasePOI / BaseRepairablePOI. If you migrate a POI from the upstream
#   pointOfInterest pipeline, copy here the components those base prototypes used to add
#   (ForceAnchor, Tag {POI}, IFF, InitRepairSnapshot, etc.) — see existing entries for examples.

# ───────────────────────────────────────────────────────────────────────────
# Hidden POI — listening post inside blue nebulas.
- type: nebulaPoi
  id: NebulaPoiLPBravo
  path: /Maps/_Exodus/POI/lpbravo.yml
  spawnIn:
  - NebulaBlueMarker
  - NebulaGreenMarker
  minDensity: 0.7
  protectedRadius: 3000
  name: "Прослушивающий Пункт Браво"
  stationGameMap: LPBravo
  hideWarp: true
  addComponents:
  - type: IFF
    color: "#C83737"
    flags: [HideLabel]
    readOnly: false
  - type: SyndicateFOB
  - type: SolarPoweredGrid
    trackOnInit: true
    doNotCull: true
  - type: ForceAnchor       # inherited from BasePOI in the upstream prototype
  - type: Tag               # inherited from BasePOI
    tags: [ POI ]
  - type: InitRepairSnapshot
  - type: ShipRepairRestrict
    toolWhitelist:
      tags:
      - SyndicateRepairTool

