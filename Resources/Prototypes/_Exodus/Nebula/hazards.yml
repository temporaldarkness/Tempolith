    - texture: _Exodus/Parallaxes/Nebula/Red_Nebula_Cloud/Red_Nebula_Lightning.png
      offset: 0,4
      shader: unshaded
  - type: PointLight
    enabled: true
    color: "#ff0000"
    radius: 5.5
    softness: 1
    autoRot: true
    castShadows: false
