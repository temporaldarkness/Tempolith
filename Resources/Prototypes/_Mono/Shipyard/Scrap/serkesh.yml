- type: vessel
  id: Serkesh
  parent: BaseVessel
  name: Серкеш # Ru-Localization
  description: Железный кулак Корсаров Красного Паруса. Не самый большой, не самый страшный и уж точно не самый быстрый. Собран в захолустных портах галактики по наполовину сгоревшим и наполовину утерянным чертежам Андромеды - когда как Серкеш - дитя-франкенштейн. Он некрасив, не умеет показывать фокусы, но своё дело делает. Вооружённая тяжёлым баллистическим оружием, эта тяжелобронированная машина способна обмениваться ударами с любым шаттлом на коротких и средних дистанциях. # Ru-Localization
  price: 262000 # 146K base x 1.8 -> 262K (80% markup for high gunnery).
  category: medium
  group: Scrap
  access: Mercenary
  shuttlePath: /SharedMaps/_Mono/Shuttles/Scrap/serkesh.yml
  addComponents:
  - type: NpcFactionMember # Exodus NanoTrasen faction
    factions:
    - NanoTrasen
  guidebookPage: Null
  class:
  - pursuit
  - Scrapyard

  engine:
  - AME

- type: gameMap
  id: Serkesh
  mapName: 'Серкеш' # Ru-Localization
  mapPath: /SharedMaps/_Mono/Shuttles/Scrap/serkesh.yml
  minPlayers: 0
  stations:
    Serkesh:
      stationProto: StandardFrontierVessel
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Серкеш{1}' # Ru-Localization
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: StationJobs
