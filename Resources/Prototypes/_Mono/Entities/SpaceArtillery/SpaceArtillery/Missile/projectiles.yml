- type: entity
  id: ShipMissileBase
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  abstract: true
  components:
  - type: ShipWeaponProjectile
  - type: Fixtures
    fixtures:
      hit:
        shape: !type:PhysShapeCircle
          radius: 2
        layer:
        - BulletImpassable # Mono - ProjectileGridPhase will take care of collisions with same ship shots
        - Opaque
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.15,-0.45,0.15,0.15"
        hard: false
        mask:
        - Impassable
        - BulletImpassable
      fly-by:
        shape: !type:PhysShapeCircle
          radius: 1.5
        layer:
        - Impassable
        - MidImpassable
        - HighImpassable
        - LowImpassable
        hard: False
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak

