- type: entity
  id: BannerNGC
  parent: BannerBase
  name: TSF banner
  description: A banner proudly displaying the stars of the Trans-Solar Federation.
  components:
  - type: Sprite
    sprite: _Mono/Structures/Decoration/banner.rsi
    state: ngc-banner
  - type: Construction
    graph: MonoBannersGraph
    node: BannerTSFNode
  - type: Anchorable # Exodus territory-banner-anchor-delay
    delay: 60 # Exodus territory-banner-anchor-delay
  # Exodus start - Territory claim banner for ТСФ
  - type: TerritoryBanner
    faction: TSFMC
  # Exodus end

- type: entity
  id: BannerSHM
  parent: BannerBase
  name:  SHM banner
  description: A banner effectively representing the iconography of Steel Hammer Manufacturing Inc.
  components:
  - type: Sprite
    sprite: _Mono/Structures/Decoration/banner.rsi
    state: shm-banner
  - type: Construction
    graph: MonoBannersGraph
    node: BannerSHMNode

- type: entity
  id: BannerDrakeIndustries
  parent: BannerBase
  name: DI banner
  description: A banner harboring Drake Industries' emblem. The mega corp's emblem is woven into a high quality textile that you've doubt you've every seen anywhere else in the sector. Must be why the banner is not attached to, but rather fused on it's pole.
  components:
  - type: Sprite
    sprite: _Mono/Structures/Decoration/banner.rsi
    state: di-banner
  - type: Construction
    graph: MonoBannersGraph
    node: BannerDINode

