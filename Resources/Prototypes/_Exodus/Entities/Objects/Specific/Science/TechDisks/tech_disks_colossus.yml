- type: entity
  parent: TechDiskBase
  id: TechDiskColossusBorgModules
  name: colossus cyborg modules tech disk
  description: A disk capable of adding Colossus-Central cyborg field and breaching modules to a server's recipes.
  components:
  - type: Sprite
    layers:
    - state: icon
      map: ["enum.DamageStateVisualLayers.Base"]
      color: "#cf2b2b"
    - state: label
    - state: protect
    - state: holo
      shader: unshaded
  - type: TechnologyDisk
    recipes:
    - BorgModuleColossusField
    - BorgModuleColossusBreaching

- type: entity
  parent: TechDiskBase
  id: TechDiskColossusSecurityBorgEndoskeleton
  name: colossus security cyborg endoskeleton tech disk
  description: A disk capable of adding a Colossus-Central security cyborg endoskeleton to a server's recipes.
  components:
  - type: Sprite
    layers:
    - state: icon
      map: ["enum.DamageStateVisualLayers.Base"]
      color: "#cf2b2b"
    - state: label
    - state: protect
    - state: holo
      shader: unshaded
  - type: TechnologyDisk
    recipes:
    - CyborgEndoskeletonColossusSecurity
