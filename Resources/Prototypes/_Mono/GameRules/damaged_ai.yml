- type: entityTable
  id: DamagedAIShipsTable
  table: !type:AllSelector # we need to pass a list of rules, since rules have further restrictions to consider via StationEventComp
    children:
      - id: UnknownShuttleZenith
      - id: UnknownShuttleWyrm
      - id: UnknownShuttleNebula
      - id: UnknownShuttleOmen # Exodus      
      - id: UnknownShuttleCrow # Exodus
      - id: UnknownShuttleZenithA # Exodus

- type: entityTable
  id: DamagedAIShipsTableT2
  table: !type:AllSelector # we need to pass a list of rules, since rules have further restrictions to consider via StationEventComp
    children:
    - id: UnknownShuttleZenithE
    - id: UnknownShuttleRazorN
    - id: UnknownShuttleWyvern
    - id: UnknownShuttleZenith
    - id: UnknownShuttleWyrm
    - id: UnknownShuttleNebula
    - id: UnknownShuttleConcordX # Exodus
    - id: UnknownShuttleMantaray # Exodus
    - id: UnknownShuttleZenithA # Exodus

- type: entity
  parent: BaseRandomShuttleRule
  id: UnknownShuttleZenith
  components:
  - type: StationEvent
    startAnnouncement: station-event-ai-shuttle-detected
    startAudio:
      path: /Audio/Misc/notice1.ogg
    weight: 2
    maxOccurrences: 4
  - type: GameRule
    minPlayers: 32
  - type: LoadMapRule
    gridPath: /Maps/_Exodus/ShuttleEvent/zenith.yml # Exodus-Tweak
  - type: GameRuleRequirements # Exodus
    requirements:
    - !type:JobGameRuleRequirement
      department: Combatant
      minDepartmentPlayers: 6

