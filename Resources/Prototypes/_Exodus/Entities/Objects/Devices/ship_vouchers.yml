- type: entity
  parent: BaseShipLPCRenewable
  id: ShipVoucherSentinelF
  name: TSF Sentinel-F LPC [T1]
  description: A small card that contains the data for the procurement of a Sentinel-F-class escort from the flagship's reserves.
  components:
  - type: Sprite
    layers:
    - state: icon
    - state: screen
      color: "#05ffff"
    - state: screen9
      color: "#05ffff"
      shader: unshaded
  - type: ShipyardVoucher
    destroyOnEmpty: false
    cooldown: 7200 # one hour
    consoleType: Security
    companyName: TSF
    vessels:
    - SentinelF
  - type: StaticPrice
    vendPrice: 325000

