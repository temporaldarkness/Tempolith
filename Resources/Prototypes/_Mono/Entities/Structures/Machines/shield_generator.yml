# High-End
- type: entity
  id: ShieldGenerator
  parent: ShieldGeneratorBase
  name: MS-500 "Titan" Shield Generator
  description: The Titan. Advanced shielding, with a quick recharge time, and excels against colisions.
  suffix: ADS ONLY
  components:
  - type: ShipShieldEmitter
    damageLimit: 75000
    damageOverloadTimePunishment: 40
    healPerSecond: 950 # Base is 250
    damageExp: 1.05 # Base is 1.1
    baseDraw: 40000 # Base is 50000
    maxDraw: 100000 # Base is 150000
    unpoweredBonus: 6 # Base is 6
    shieldColor: "#FF3333"
    collisionResistanceMultiplier: 0.05
  - type: ShipRepairable
    repairTime: 30
    repairCost: 300
  - type: ShipRepairableRestrict
    toolWhitelist:
      tags:
      - ADSRepairTool

