    state: erebus_4x
  - type: ESGunComponentAttachment
    component:
    - type: CursorOffsetRequiresWield
    - type: EyeCursorOffset
      maxOffset: 3
      pvsIncrease: 0.5
  - type: ESGunRecoilAttachment
    recoilRecoveryModifier: 1.05
    recoilIncreaseModifier: 2.0
    minSpreadModifier: 0.95
    maxSpreadModifier: 1.0
  - type: Tag
    tags:
    - MonoOptic
    - MonoOptic4x
    - MonoOpticErebusRailmount

- type: entity
  parent: BaseGunAttachmentOptic
  id: GunAttachmentOpticErebus8x
