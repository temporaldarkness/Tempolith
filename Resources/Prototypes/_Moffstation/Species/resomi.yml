- type: species
  id: Resomi
  name: species-name-resomi
  roundStart: true # Exodus-restore
  prototype: MobResomi # Exodus-restore: use the Resomi entity with species mechanics
  sprites: MobResomiSprites
  defaultSkinTone: "#faf7f7"
  markingLimits: MobResomiMarkingLimits
  maleFirstNames: NamesResomiUnisex
  femaleFirstNames: NamesResomiUnisex
  naming: First
  dollPrototype: MobResomiDummy
  skinColoration: Hues
  minAge: 26
  youngAge: 50
  oldAge: 90
  maxAge: 140
  defaultHeight: 1
  defaultWidth: 1
  maxHeight: 1.07
  maxWidth: 1.07
  minHeight: 0.93
  minWidth: 0.93
  minHeightCm: 125
  maxHeightCm: 165
  standardWeight: 40
  standardDensity: 17

- type: speciesBaseSprites
  id: MobResomiSprites
  sprites:
    Head: MobResomiHead
    HeadTop: MobHumanoidAnyMarking
    HeadSide: MobHumanoidAnyMarking
    Hair: MobResomiHair
    Chest: MobResomiTorso
    Eyes: MobResomiEyes
    LArm: MobResomiLArm
    RArm: MobResomiRArm
    LHand: MobResomiLHand
    RHand: MobResomiRHand
    LLeg: MobResomiLLeg
    RLeg: MobResomiRLeg
    LFoot: MobResomiLFoot
    RFoot: MobResomiRFoot
    Special: MobHumanoidAnyMarking
    TailExtras: MobHumanoidAnyMarking
    Tail: MobHumanoidAnyMarking

- type: markingPoints
  id: MobResomiMarkingLimits
  onlyWhitelisted: true
  points:
    Special:
      points: 10
      required: false
    Hair:
      points: 1
      required: false
    TailExtras:
      points: 3
      required: false
    Tail:
      points: 1
      required: true
      defaultMarkings: [ ResomiTailFeathered ]
    Legs:
      points: 6
      required: false
    Arms:
      points: 6
      required: false
    Head:
      points: 4
      required: false
    HeadTop:
      points: 4
      required: false
    HeadSide:
      points: 2
      required: false
    Chest:
      points: 4
      required: false

