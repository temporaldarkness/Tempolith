# Exodus: Borg variants using AiRemoteBrain instead of PositronicBrain.
# These are placed on maps so a Station AI can take control from round start.
# No GhostRole / GhostTakeoverAvailable — player access is intentionally removed.

# NT generic borg
- type: entity
  id: AiRemoteBorgBattery
  parent: BorgChassisSelectable
  suffix: AI Remote
  categories: [ HideSpawnMenu ]
  components:
  - type: ContainerFill
    containers:
      borg_brain:
      - AiRemoteBrain
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellMedium

# Colossus-Central borg
- type: entity
  id: AiRemoteBorgColossus
  parent: AiRemoteBorgBattery
  suffix: AI Remote, Colossus
  categories: [ HideSpawnMenu ]
  components:
  - type: Access
    groups:
    - AllAccess
    enabled: true
  - type: IntrinsicRadioTransmitter
    channels:
    - Common
    - Traffic
    - Command
    - Engineering
    - Medical
    - Science
    - Security
    - Service
    - Supply
  - type: ActiveRadio
    channels:
    - Common
    - Traffic
    - Command
    - Engineering
    - Medical
    - Science
    - Security
    - Service
    - Supply
  - type: BorgSwitchableType
    inherentRadioChannels:
    - Common
    - Traffic
    - Command
    - Engineering
    - Medical
    - Science
    - Security
    - Service
    - Supply

