- type: entity
  id: GyrodyneMachineCircuitboard
  parent: BaseMachineCircuitboard
  name: gyrodyne machine board
  description: A machine board for a gyrodyne. A powerful bluespace-assisted gyroscope.
  components:
  - type: Sprite
    state: engineering
  - type: MachineBoard
    prototype: Gyrodyne
    frameSize: 2x2
    requirements:
      Manipulator: 4
    stackRequirements:
      Steel: 400
      Iridite: 10
      Uranium: 200
      Bluespace: 8

- type: entity
  id: Gyrodyne
  parent: [BaseThruster, ConstructibleMachine]
  name: gyrodyne
  description: >-
    A massive bluespace-assisted gyroscope capable of rotating even the largest vessels.
    Requires significant power to operate.
  placement:
    mode: AlignTileAny
  components:
  - type: Machine
    board: GyrodyneMachineCircuitboard
  - type: Construction
    graph: Machine2x2Partial
    node: machine
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-1.45,1.45,0.45"
        density: 1200
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Thruster
    thrusterType: Angular
    requireSpace: false
    baseThrust: 10000
    thrust: 10000
    machinePartThrust: Manipulator
  - type: ApcPowerReceiver
    powerLoad: 40000
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Electronic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1200
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
  - type: Sprite
    sprite: _Exodus/Structures/Shuttles/gyrodyne.rsi
    offset: 0.5,-0.5
    layers:
    - state: base
      map: ["enum.ThrusterVisualLayers.Base"]
    - state: thrust
      map: ["enum.ThrusterVisualLayers.ThrustOn"]
      shader: unshaded
      visible: false
    - state: thrust_burn
      map: ["enum.ThrusterVisualLayers.Thrusting"]
      visible: false
    - state: thrust_burn_unshaded
      map: ["enum.ThrusterVisualLayers.ThrustingUnshaded"]
      shader: unshaded
      visible: false
  - type: PointLight
    radius: 1.3
    energy: 0.8
    enabled: false
    offset: "0, 0.1"
    color: "#4246b3"
  - type: AmbientSound
    enabled: false
    range: 6
    volume: -4
    sound:
      path: /Audio/Effects/shuttle_thruster.ogg
  - type: Rotatable
    rotateWhileAnchored: false
    increment: 90
  - type: Anchorable
    flags: Anchorable
  - type: StaticPrice
    price: 3000
  - type: ShipRepairable
    repairTime: 20
    repairCost: 100
  - type: RadarBlip
    visibleFromOtherGrids: true
    radarColor: "#4246b3"
    scale: 2
    shape: diamond
    gridConfig:
      color: "#4246b3"
      shape: Square
      respectZoom: true
      rotate: false
      bounds: "-0.5,-1.5,1.5,0.5"
