  - /Audio/_Mono/Weapons/Guns/Gunshots/autocannon_1.ogg
  - /Audio/_Mono/Weapons/Guns/Gunshots/autocannon_2.ogg
  - /Audio/_Mono/Weapons/Guns/Gunshots/autocannon_3.ogg

