- type: entity
  id: PaladinMagazine
  name: "Paladin 250mm HE missile autoloader"
  parent: [BaseItem, RecyclableItemSteelTiny]
  components:
  - type: Tag
    tags:
    - PaladinMagazine
  - type: Item
    size: Small
  - type: BallisticAmmoProvider
    proto: MissileCartridge250mm
    capacity: 24
    mayTransfer: true
    whitelist:
      tags:
      - MissileCartridge250mm
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Ammunition/Boxes/generic_shipgun_box.rsi
    layers:
    - state: base
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-0
      map: [ "enum.GunVisualLayers.Mag" ]
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: false
  - type: Appearance

- type: entity
  id: PaladinMagazineInfinite
  parent: PaladinMagazine
  components:
  - type: BallisticAmmoProvider
    infiniteUnspawned: true
    proto: MissileCartridge250mm
    capacity: 24
    mayTransfer: true
    whitelist:
      tags:
      - MissileCartridge250mm

- type: entity
  id: PaladinMagazineEMPHE
  name: "Paladin 250mm EMPHE missile autoloader"
  parent: PaladinMagazine
  components:
  - type: BallisticAmmoProvider
    proto: TovekCartridge
    capacity: 24
    mayTransfer: true
    whitelist:
      tags:
      - MissileCartridge250mm

- type: entity
  id: TovekCartridge
  name: 250mm EMPHE missile
  description: An individual ASM-250 EMPHE missile for a Tovek/Paladin launcher.
  parent: BaseGrenade
  components:
  - type: Tag
    tags:
    - TovekCartridge
    - MissileCartridge250mm
  - type: Item
    size: Huge
  - type: CartridgeAmmo
    proto: ShipMissileASM250
    deleteOnSpawn: true
    muzzleFlash: null
  - type: Sprite
    sprite: _Mono/Objects/SpaceArtillery/hybrid_missile.rsi
    layers:
    - state: hybrid-missile
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 250
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:ExplodeBehavior
  - type: Explosive
    explosionType: Default
    maxIntensity: 100
    intensitySlope: 3
    totalIntensity: 3
  - type: ExplodeOnTrigger
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic

- type: entity
  id: MissileCartridge250mm
  name: 250mm HEAT missile
  description: An individual ASM-250 HEAT missile for a Tovek/Paladin launcher.
  parent: BaseGrenade
  components:
  - type: Tag
    tags:
    - TovekCartridge
    - MissileCartridge250mm
  - type: Item
    size: Huge
  - type: CartridgeAmmo
    proto: ShipMissileASM250HEAT
    deleteOnSpawn: true
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Ammunition/Explosives/generic_cartridges.rsi
    layers:
    - state: tovek
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 250
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:ExplodeBehavior
  - type: Explosive
    explosionType: Default
    maxIntensity: 100
    intensitySlope: 5
    totalIntensity: 16
  - type: ExplodeOnTrigger
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic

