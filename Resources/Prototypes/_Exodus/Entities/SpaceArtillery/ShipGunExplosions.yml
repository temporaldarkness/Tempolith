# Exodus: self-destruct explosion for ship guns.
# When a gun reaches its destruction damage threshold it triggers a powerful
# explosion before being removed.
#
# A gun mixes in TWO of these parents:
#   - one HP/destruction tier:  ShipGunTier{1..5}HpExploding
#       Identical HP thresholds to the original BallisticArtilleryTier{1..5}HP,
#       plus an ExplodeBehavior on every destruction threshold.
#   - one blast size:           ShipGunExplodes3x3 / ShipGunExplodes5x5
#       Just the Explosive component.
#
# Example gun parent list:
#   parent:
#   - BallisticArtilleryMagazine
#   - ShipGunTier2HpExploding
#   - ShipGunExplodes3x3
#
# The ShipGunSelfDestruct explosion (Structural: 50) breaks reinforced
# plastitanium walls and most objects within the blast radius.

# ----- Blast size mixins -----

- type: entity
  id: ShipGunExplodes3x3
  abstract: true
  components:
  - type: Explosive
    explosionType: ShipGunSelfDestruct
    totalIntensity: 200
    intensitySlope: 25
    maxIntensity: 50

- type: entity
  id: ShipGunExplodes5x5
  abstract: true
  components:
  - type: Explosive
    explosionType: ShipGunSelfDestruct
    totalIntensity: 400 # Exodus ship-gun-self-destruct (was 600)
    intensitySlope: 17
    maxIntensity: 60

# ----- HP/destruction tiers (BallisticArtilleryTier{1..5}HP + ExplodeBehavior) -----

- type: entity
  id: ShipGunTier1HpExploding
  abstract: true
  components:
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: WallDefense1
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 4000
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:ExplodeBehavior
    - trigger:
        !type:DamageTrigger
        damage: 3500
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:ExplodeBehavior
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak

