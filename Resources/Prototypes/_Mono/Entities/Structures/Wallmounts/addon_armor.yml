- type: entity
  name: solid armor
  description: An additional chunk of armor, attached to the side of a vessel. Provides additional protection, but makes the hull more vulnerable to explosives.
  id: WallArmorAddonSolid
  parent: BaseGreeble
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    offset: 0,0.45
    sprite: _Mono/Structures/Wallmounts/Addons/armor.rsi
    layers:
    - state: armor-solid
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: WallDefense2
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 4000
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:ChangeConstructionNodeBehavior
        node: broken
      - !type:PlaySoundBehavior
        sound:
          collection: MetalSlam
  - type: ShipRepairable
    repairTime: 3
    repairCost: 3
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,0.1,0.5,0.8"
        mask:
        - MachineMask
        layer:
        - WallLayer
        density: 1000
  - type: Construction
    graph: WallArmorAddonSolidGraph
    node: finished

