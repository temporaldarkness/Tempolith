  - type: StaticPrice
    price: 16000
  - type: Sprite
    sprite: _Mono/Objects/ShuttleWeapons/ak820.rsi
    layers:
    - state: space_artillery
    - state: fcs-unshaded
      shader: unshaded
    scale: 1, 1
  - type: Appearance
  - type: FireControlRotate
  - type: AmmoCounter
