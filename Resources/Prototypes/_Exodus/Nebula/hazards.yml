# Exodus nebula hazards
- type: entity
  name: nebula lightning
  id: NebulaRedSmallStrikeVisual
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    drawdepth: Effects
    layers:
    - texture: _Exodus/Parallaxes/Nebula/Red_Nebula_Cloud/Red_Nebula_Lightning.png
      offset: 0,4
      shader: unshaded
  - type: PointLight
    enabled: true
    color: "#ff0000"
    radius: 3.5
    softness: 1
    autoRot: true
    castShadows: false
  - type: TimedDespawn
    lifetime: 3
  - type: Tag
    tags:
    - HideContextMenu

- type: entity
