- type: vessel
  id: Saturn
  parent: BaseVesselAntag
  name: Сатурн # Ru-Localization
  description: Заказан Династией Фаэтон ввиду острой необходимости в тяжёлой огневой мощи против Федерации. Уникальный шаттл, специально разработанный с учётом запросово Династии, расквартированного на Гелиосе. # Ru-Localization
  limit: 1
  hyperwarLimit: 3
  price: 1540950
  purchasable: false # voucher only
  category: Large
  group: BlackMarket
  access: Pirate
  shuttlePath: /SharedMaps/_Exodus/Shuttles/Capitals/saturn.yml # Exodus
  addComponents: # Exodus faction-owned shuttle target filtering
  - type: NpcFactionMember
    factions:
    - PirateNF
  guidebookPage: Null
  class:
  - Pirate
  - Capital
  - Destroyer
  - Medical
  - Chemistry
  - Pursuit
  - Patrol
  engine:
  - AME

- type: gameMap
  id: Saturn
  mapName: 'Сатурн' # Ru-Localization
  mapPath: /SharedMaps/_Exodus/Shuttles/Capitals/saturn.yml # Exodus
  minPlayers: 0
  stations:
    Saturn:
      stationProto: StandardFrontierSecurityVessel
      gridComponents:
      - type: VesselInfo
        description: "Ответ Династии Фаэтон захватчикам из ТСФ. Она выдерживает удары, как никакой другой шаттл. Слава Династии!" # Ru-Localization
      components:
      - type: StationNameSetup
        mapNameTemplate: 'Сатурн{1}' # Ru-Localization
        nameGenerator:
          !type:NanotrasenNameGenerator
          prefixCreator: '14'
      - type: StationJobs
        availableJobs:
          Pirate: [ 0, 0 ]
