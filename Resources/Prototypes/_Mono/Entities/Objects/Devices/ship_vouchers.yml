#LPC base (just different sprites)
- type: entity
  abstract: true
  parent: BaseShipVoucher
  id: BaseShipLPC
  name: ship LPC
  description: Contains the necessary data for a shipyard console to produce a certain design.
  components:
  - type: Sprite
    sprite: _Mono/Objects/Misc/lpcnew.rsi # Exodus-Fix
    state: icon
  - type: ShipyardVoucher
    destroyOnEmpty: false
    cooldown: 1800 # thirty minutes

#Ironman Voucher
- type: entity
  parent: BaseShipVoucher
  id: ShipVoucherFrontierIronMan
  name: Ironman LPC
  description: Allows purchase of one free Baeg or Framework from the Shipyard. Destroyed on sale.
  components:
  - type: Sprite
    sprite: _Mono/Objects/Misc/lpcnew.rsi
    layers:
    - state: icon_fighter
    - state: screen
      color: "#e68e00"
    - state: screen6
      color: "#e68e00"
      shader: unshaded
  - type: ShipyardVoucher
    vessels:
    - Baeg
    - Framework
    consoleType: Shipyard
    destroyOnEmpty: true

