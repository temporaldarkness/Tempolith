    range: 500
  - type: GunSignalControl
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.6,-0.6,0.6,0.6"
        density: 1500
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Gun
    projectileSpeed: 360
    minAngle: 0
    maxAngle: 0.5
    fireRate: 2.5
    recoil: 10
    selectedMode: FullAuto
    availableModes: FullAuto
    shootThermalSignature: 12000000
    soundGunshot:
      collection: 120mmAutocannonAK820
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/lmg_empty.ogg
  - type: SpaceArtillery
  - type: Actions
  - type: RadarBlip
    radarColor: "#FF0000"
    scale: 2
    visibleFromOtherGrids: true
    gridConfig:
      color: "#FF0000"
