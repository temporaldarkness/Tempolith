- type: vessel
  id: Snakelet
  parent: BaseVessel
  name: Змеёныш # Ru-Localization
  description: Дрон с усиленным носовым вооружением и малым боевым отсеком вооружения с ручной перезарядкой. Предназначен для быстрых бомбардировочных ударов. # Ru-Localization
  limit: 4
  price: 20000
  purchasable: false #voucher only
  category: Small
  group: Custom
  mapchecker_group_override: Shipyard  # Treat this as a Shipyard vessel for mapchecker purposes
  shuttlePath: /SharedMaps/_Mono/Shuttles/Carrier/snakelet.yml
  guidebookPage: Null
  class:
  - Pursuit
  - Fighter
  engine:
  - APU

- type: gameMap
  id: Snakelet
  mapName: 'Змеёныш' # Ru-Localization
  mapPath: /SharedMaps/_Mono/Shuttles/Carrier/snakelet.yml
  minPlayers: 0
  stations:
    Snakelet:
      stationProto: StandardFrontierVessel
      components:
      - type: StationNameSetup
        mapNameTemplate: 'Змеёныш {1}' # Ru-Localization
        nameGenerator:
          !type:NanotrasenNameGenerator
          prefixCreator: '14'
      - type: StationJobs
        availableJobs: {}
