- type: entity
  name: Urist McChicken
  parent: BaseMobHuman
  id: BaseMobResomi
  abstract: true
  components:
   # Einstein Engines - Start - Language
  - type: LanguageKnowledge
    speaks:
    - TauCetiBasic
    understands:
    - TauCetiBasic
   # Einstein Engines - End
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 120 # Monolith
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: DamageVisuals
    thresholds: [ 25, 50, 75, 100 ]
    damageOverlayGroups:
      Brute:
        sprite: _Moffstation/Mobs/Effects/Resomi/brute_damage.rsi
        color: "#C048C2"
      Burn:
        sprite: _Moffstation/Mobs/Effects/Resomi/burn_damage.rsi
  - type: FireVisuals
    sprite: _Moffstation/Mobs/Effects/onfire.rsi
    normalState: Resomi_minor_burning
    alternateState: Resomi_burning
  - type: HumanoidAppearance
    species: Resomi
    hideLayersOnEquip:
      - Special
      - Head
      - Hair
      - HeadTop
      - HeadSide
  - type: Icon
    sprite: _Moffstation/Mobs/Species/Resomi/parts.rsi
    state: full
  - type: Body
    prototype: Resomi
    requiredLegs: 2
  # Monolith - Start - MEAT
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatResomi
      amount: 5
  # Monolith - End
  - type: Speech
    speechVerb: Resomi
    speechSounds: UnisexResomi
    allowedEmotes: ['Chirp', 'Trill', 'Scree', 'Call', 'Squawk', 'Warble', 'Wurble', 'Bagawk'] #goob
  - type: ResomiAccent
  - type: Vocal
    sounds:
      Male: UnisexResomi
      Unsexed: UnisexResomi
      Female: UnisexResomi
  - type: TypingIndicator
    proto: resomi
  # Goobstation - Start - Resomi Changes
  - type: Bloodstream # Lore stuff
    bloodReagent: AmmoniaBlood
  - type: MeleeWeapon # Aliem raptors probably use their claws
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 5
  - type: Damageable # Resomi damage modifiers
    damageModifierSet: Resomi
  - type: Temperature
    coldDamageThreshold: 195.4 # Freezing point of ammonia is -77.75°C
    heatDamageThreshold: 320.15 # Space chickens can't tolerate reasonable temperatures, but requiring them to stay icy would be cringe, so instead make their heat damage threshold dangerously close to standard atmos, at 47°C
    coldDamage:
      types:
        Cold : 0.05 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat : 3 #per second, scales with temperature & other constants
  - type: TemperatureSpeed # You're supposed to be used to the cold why are you so slow
    thresholds: # Calculated based on UI alert thresholds, rounded up
      272: 0.8
      242: 0.6
      196: 0.4
  - type: MovementSpeedModifier
    baseWalkSpeed: 2.875 # Exodus-restore: +15% over default 2.5
    baseSprintSpeed: 5.175 # Exodus-restore: +15% over default 4.5
    weightlessAcceleration: 2.5 # Birb move fast in zero-g
  - type: MobThresholds # Exodus resomi-hp: 90% of standard human thresholds
    thresholds:
      0: Alive
      90: Critical
      170: Dead
  - type: PseudoItem # Baggable; certified smol ops
    storedOffset: -10,0
    shape:
      - 0, 0, 3, 2
      - 0, 2, 5, 4
  # Goobstation - End
  - type: Hands
    handDisplacement:
      sizeMaps:
        32:
          sprite: _Moffstation/Mobs/Species/Resomi/displacement.rsi
          state: inHand
  - type: Inventory
    speciesId: resomi
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _Moffstation/Mobs/Species/Resomi/displacement.rsi
            state: jumpsuit
      head:
        sizeMaps:
          32:
            sprite: _Moffstation/Mobs/Species/Resomi/displacement.rsi
            state: head
      eyes:
        sizeMaps:
          32:
            sprite: _Moffstation/Mobs/Species/Resomi/displacement.rsi
            state: eyes
      gloves:
        sizeMaps:
          32:
            sprite: _Moffstation/Mobs/Species/Resomi/displacement.rsi
            state: hands
      back:
        sizeMaps:
          32:
            sprite: _Moffstation/Mobs/Species/Resomi/displacement.rsi
            state: back
      ears:
        sizeMaps:
          32:
            sprite: _Moffstation/Mobs/Species/Resomi/displacement.rsi
            state: ears
      shoes:
