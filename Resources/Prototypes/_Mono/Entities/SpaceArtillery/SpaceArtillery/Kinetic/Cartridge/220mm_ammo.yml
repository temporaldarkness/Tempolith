- type: entity
  id: 220mmCartridgeAPHE
  name: 220mm APHE shell
  description: A chemically-propelled armor-piercing high-explosive shell for 220mm cannons.
  parent: BaseGrenade
  components:
  - type: Tag
    tags:
    - 220mmCartridge
  - type: Item
    size: Huge
  - type: CartridgeAmmo
    proto: 220mmBulletAPHE
    deleteOnSpawn: true
    muzzleFlash: null
  - type: Sprite
    sprite: _Mono/Objects/SpaceArtillery/shells.rsi
    layers:
    - state: 220mmAPHE
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 250
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:ExplodeBehavior
  - type: Explosive
    explosionType: Default
    maxIntensity: 100
    intensitySlope: 3
    totalIntensity: 30
  - type: ExplodeOnTrigger
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
