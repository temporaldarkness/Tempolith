- type: entity
  id: MonoAISTCShuttleSpawnerScheduler
  parent: BaseGameRule
  components:
    - type: BasicStationEventScheduler
      scheduledGameRules: !type:NestedSelector
        tableId: DamagedAIShipsTable
      minimumTimeUntilFirstEvent: 3600 # 1 hour
      minMaxEventTiming:
        min: 3600 # 60 minutes between events Exodus-Tweak
        max: 7200 # 120 minutes between events

- type: entity
  id: MonoAISTCShuttleSpawnerSchedulerTier2
  parent: BaseGameRule
  components:
  - type: BasicStationEventScheduler
    scheduledGameRules: !type:NestedSelector
      tableId: DamagedAIShipsTableT2
    minimumTimeUntilFirstEvent: 7200 # 2 hours Exodus-Tweak
    minMaxEventTiming:
      min: 3600 # 60 minutes between events
      max: 3600 # 60 minutes between events

- type: entity
  id: MonoAsakimSTCShuttleSpawnerScheduler
  parent: BaseGameRule
  components:
  - type: BasicStationEventScheduler
    scheduledGameRules: !type:NestedSelector
      tableId: AsakimShipsTable
    minimumTimeUntilFirstEvent: 3600 # 1 hour
    minMaxEventTiming:
      min: 3600 # 60 minutes between events
      max: 5400 # 90 minutes between events Exodus-Tweak

- type: entity
  id: MonoChimeraSTCShuttleSpawnerScheduler
  parent: BaseGameRule
  components:
  - type: BasicStationEventScheduler
    scheduledGameRules: !type:NestedSelector
      tableId: ChimeraShipsTable
    minimumTimeUntilFirstEvent: 3600 # 1 hour
    minMaxEventTiming: #2-4
      min: 2400 # 40 minutes between events
      max: 4800 # 80 minutes between events

- type: entity
  abstract: true
  parent: BaseGameRule
  id: BaseRandomShuttleRule
  categories: [ Spawner ] # Exodus-azimuth: map-loading rules should not be spawned by spawn-all tests
  components:
  - type: StationEvent
    weight: 10
    reoccurrenceDelay: 30
    duration: 1
    maxOccurrences: 2 # should be the same as [copies] in ship_spawns.yml
  - type: RuleGrids
  - type: LoadMapRule

- type: entity
  id: MonoMonolithicEventsScheduler
  parent: BaseGameRule
  components:
  - type: BasicStationEventScheduler
    scheduledGameRules: !type:NestedSelector
      tableId: MonoMonolithicEventsTable
    minimumTimeUntilFirstEvent: 600 # 10 minutes
    minMaxEventTiming:
      min: 420 # 7 minutes between events
      max: 1200 # 20 minutes between events
