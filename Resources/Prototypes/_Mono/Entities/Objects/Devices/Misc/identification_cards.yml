- type: entity
  name: spasaka ID card
  parent: [ IDCardStandard, BaseFactionGearPDVT2 ]
  id: PDVSpasakaIDCard
  suffix: Chameleon
  components:
  - type: PresetIdCard
    job: PDVInfiltrator
  - type: Access
    tags:
    - Maintenance
    - Pirate
    - Mercenary
  - type: Sprite
    sprite: _Mono/Objects/Misc/id_cards.rsi
    layers:
    - state: base
    - state: id_rakhshan
  - type: AgentIDCard
  - type: ActivatableUI
    key: enum.AgentIDCardUiKey.Key
    inHandsOnly: true
  - type: Tag
    tags:
    - DoorBumpOpener
  - type: ChameleonClothing
    slot: [idcard]
    default: PDVRakhshanIDCard
    requireTag: WhitelistChameleonIdCard
  - type: UserInterface
    interfaces:
      enum.AgentIDCardUiKey.Key:
        type: AgentIDCardBoundUserInterface
      enum.ChameleonUiKey.Key:
        type: ChameleonBoundUserInterface
  - type: Contraband # Frontier
    hideValues: true # Frontier

