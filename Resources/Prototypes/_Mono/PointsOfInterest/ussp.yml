- type: pointOfInterest
  id: USSPCamelot
  parent: [BasePOI, BaseRepairablePOI]
  name: 'Форт Камелот' # Ru-Localization
  minimumDistance: 10650
  maximumDistance: 12400
  spawnGamePreset: [ NFAdventure, NFPirate, MonoStandard, MonoRogueUSSP, MonoTSFUSSP, MonoADS, MonoChimera, MonoMixed, MonoAllAtOnce ]
  spawnGroup: Required
  gridPath: /Maps/_Exodus/POI/camelot.yml # Exodus
  addComponents:
  - type: IFF
    color: "#ccaa55"
  - type: Tower7G # Exodus-Adminbus
    range: 128

- type: gameMap
  id: USSPCamelot
  mapName: 'Форт Камелот' # Ru-Localization
  mapPath: /Maps/_Exodus/POI/camelot.yml # Exodus
  minPlayers: 0
  stations:
    USSPCamelot:
      stationProto: RecordsFrontierOutpostCargo
      gridComponents:
        - type: VesselMusic
          ambientMusicPrototype: CamelotMusic
        - type: VesselInfo
          description: "Ветхая станция, некогда принадлежавшая СССП. Холодно и темно." # Ru-Localization
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Форт Камелот' # Ru-Localization
        - type: ExtraStationInformation
          icon:
            sprite: _NF/Structures/Storage/Crates/secure_ammo.rsi
            state: icon
          stationSubtext: 'frontier-lobby-camelot-subtext'
          stationDescription: 'frontier-lobby-camelot-description'
          lobbySortOrder: 4
        - type: StationJobs
          availableJobs:
            # Exodus-begin disable-ussp-faction
            # USSPCommissar: [1, 1]
            # USSPSergeant: [4, 4]
            # USSPRifleman: [-1, -1]
            # VGCommander: [1, 1]
            # VGLieutenant: [2, 2]
            # VGInfanteer: [-1, -1]
            # Exodus-end
            Contractor: [-1, -1]
            Pilot: [0, -1]
            Mercenary: [0, -1]
          # tags: # Exodus disable-ussp-faction
          # - USSPCommand
        - type: StationDeadDrop
          maxDeadDrops: 2 # Fewer here, players start here.
