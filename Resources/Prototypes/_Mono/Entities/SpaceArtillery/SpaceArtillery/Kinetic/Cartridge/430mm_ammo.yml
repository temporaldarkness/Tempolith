- type: entity
  id: R300ShellHE
  name: 430mm HE shell
  description: Giant sluggish HE shell. Exclusive to the R300.
  parent: BaseGrenade
  components:
  - type: Tag
    tags:
    - R300Shell
  - type: Item
    size: Huge
  - type: CartridgeAmmo
    proto: R300BulletHE
    deleteOnSpawn: true
    muzzleFlash: MuzzleFlashEffectR300
  - type: Sprite
    sprite: _Mono/Objects/SpaceArtillery/shells.rsi
    scale: 1.5, 1.5
    layers:
    - state: 255mmHE # Im lazy.
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 250
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:ExplodeBehavior
  - type: Explosive
    explosionType: Default
    maxIntensity: 100
    intensitySlope: 3
    totalIntensity: 350
  - type: ExplodeOnTrigger
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic

- type: entity
  id: R300BulletHE
  name: 430mm HE projectile
  parent: ShipMissileBase # For shootdown
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Blunt: 2000
  - type: Sprite
    sprite: _Mono/Objects/SpaceArtillery/shells.rsi
    layers:
    - state: 220mmHE
    scale: 3, 3
  - type: Ammo
    muzzleFlash: MuzzleFlashEffectR300
  - type: ShipWeaponProjectile
  - type: RadarBlip
    scale: 5
    shape: triangle
    radarColor: "#f55e1d"
  - type: TimedDespawn
    lifetime: 20
  - type: PointLight
    color: "#FCBA03"
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    totalIntensity: 3600 # This is 1/5th of a subnuclear shell
    intensitySlope: 12
    maxIntensity: 75
    maxTileBreak: 3
  - type: GatheringProjectile
  - type: MiningGatheringSoft
  - type: MiningGatheringHard
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 2000
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:ExplodeBehavior
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak

- type: entity
  id: MuzzleFlashEffectR300
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 0.8
  - type: Sprite
    drawdepth: BelowMobs
    layers:
    - shader: unshaded
      map: ["enum.EffectLayers.Unshaded"]
      sprite: _Mono/Objects/ShuttleWeapons/r300.rsi
      state: muzzle_r300
    scale: 2, 2
    offset: 0.9, 0
  - type: EffectVisuals
  - type: Tag
    tags:
    - HideContextMenu
  - type: AnimationPlayer
