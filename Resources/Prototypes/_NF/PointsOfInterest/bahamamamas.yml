# Notes:
# I want to lie, shipwrecked and comatose, drinking fresh mango juice.
- type: pointOfInterest
  id: Bahama
  parent: [BasePOI, BaseRepairablePOI]
  name: 'Багамская Мама' # Ru-Localization
  minimumDistance: 11000 # Exodus-nebula-update
  maximumDistance: 20000 # Exodus-nebula-update
  spawnGroup: RestStop
  gridPath: /Maps/_Exodus/POI/bahama.yml # Exodus
  addComponents:
  - type: StationTransit
  - type: SolarPoweredGrid
    trackOnInit: true
    doNotCull: true

- type: gameMap
  id: Bahama
  mapName: 'Багамская Мама' # Ru-Localization
  mapPath: /Maps/_Exodus/POI/bahama.yml # Exodus
  minPlayers: 0
  stations:
    Bahama:
      stationProto: DeadDropFrontierOutpost
      # Exodus start - Territory for Bahama Mama
      gridComponents:
      - type: GridTerritory
      # Exodus end
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Багамская Мама' # Ru-Localization
