- type: entity
  id: BannerPDV
  parent: BannerBase
  name: PDV banner
  description: A banner displaying the sigil of the Phaeton Dynasty.
  components:
  - type: Sprite
    sprite: _Exodus/Structures/Decoration/banner.rsi
    state: pdv-banner
  - type: Construction
    graph: MonoBannersGraph
    node: BannerPDVNode
  - type: Anchorable
    delay: 60
  - type: TerritoryBanner
    faction: PDV

