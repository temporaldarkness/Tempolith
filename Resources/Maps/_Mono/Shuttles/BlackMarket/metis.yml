  entities:
  - uid: 96
    components:
    - type: Transform
      pos: 2.4939673,-4.4063067
      parent: 1
    - type: Paper
      content: >-
        Stealth mode specifications:


        Detection range: 394/591/1600 (Shuttle/advanced/overwatch)

        Battery lifetime: +-30 minutes

        Thrust: 1 small thruster in each direction.

        Stealth mode linked to: Port 2

        Time to full effect: +-30 seconds.


        Main drive toggle:


        turns on the main drive for 10 seconds WHILE in stealth mode.

        Increases your signature by roughly 200M.

        Linked to: Port 1


        DO NOT USE OUTSIDE OF STEALTH MODE!!


        Combat/strategy:


        Try to get as close as possible (50-120M)and THEN fire the missiles.


        Vanquishers have high spread and UNGUIDED missiles.


        the key is to catch the other ship by suprise, dont get yourself caught too early!


        If all missiles hit a single spot, they can go trough 5 or 6 plastitanium layers, keep that in mind!


        Works best in groups, and againtst unshielded targets 

        (Shields are your bane as they tank missiles really well)


        Extra notes:


        This ship will suffer a temporary blackout when turning off stealth mode.


        we do not recommend mounting a shield/FTL drive on this vessel.


        we recommend you bring another crew member!


        Glory to the sultanate!
