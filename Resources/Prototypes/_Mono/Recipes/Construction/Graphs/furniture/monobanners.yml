          doAfter: 60 # Exodus - territory banner uninstall time
    # Exodus end

    # Exodus start - node for Khsira banner (Империя Кхси'Ра)
    - node: BannerKhsiraNode
      entity: BannerKhsira
      edges:
      - to: start
        completed:
        - !type:SpawnPrototype
          prototype: SheetSteel1
          amount: 2
        - !type:SpawnPrototype
          prototype: MaterialCloth1
          amount: 2
        steps:
        - tool: Screwing
          doAfter: 60 # Exodus - territory banner uninstall time
    # Exodus end

    # Exodus start - node for USSP banner
    - node: BannerUSSPNode
      entity: BannerUSSP
      edges:
      - to: start
        completed:
        - !type:SpawnPrototype
          prototype: SheetSteel1
          amount: 2
        - !type:SpawnPrototype
          prototype: MaterialCloth1
          amount: 2
        steps:
        - tool: Screwing
          doAfter: 60 # Exodus - territory banner uninstall time
