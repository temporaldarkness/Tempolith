- type: entity
  parent: MarkerBase
  id: POILootWeaponsAmmoMarker
  name: POI loot mixed weapons & ammo loot spawner
  components:
  - type: Sprite
    layers:
    - state: red
  - type: EntityTableSpawner
    table: !type:NestedSelector
      tableId: POILootMixed
      prob: 1.0

- type: entityTable
  id: POILootMixed
  table: !type:AllSelector
    children:
    - !type:NestedSelector
      tableId: POILootWeapons
      prob: 1.0
    - !type:NestedSelector
      tableId: POILootAmmo
      prob: 0.7

- type: entity
