#USSP
- type: entity
  parent: ClothingHeadsetAlt
  id: ClothingHeadsetUSSPCommand
  name: USSP command headset
  description: A modular headset issued exclusively to high ranking USSP personnel. This headset will accept standard encryption keys and comes prefitted with a key for USSP Tactical Communications. Switching to the Strategic channel produces only static.
  components:
  - type: Sprite
    sprite: Clothing/Ears/Headsets/security.rsi
  - type: Clothing
    sprite: Clothing/Ears/Headsets/security.rsi
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyCommon
      - EncryptionKeyUssp
      - EncryptionKeyFreeport

- type: entity
  parent: ClothingHeadsetAlt
  id: ClothingHeadsetUSSP
  name: USSP headset
  description: The standard-issue headset of the USSP Armed Forces for decades. This headset will accept standard encryption keys and comes prefitted with a key for USSP Tactical Communications.
  components:
