- type: entity
  parent: BasePDA
  id: BaseUSSPPDA
  description: A basic personal computer for access restriction and organization, manufactured in the USSP.
  abstract: true
  components:
  - type: Pda
  - type: CartridgeLoader
    preinstalled:
    - CrewManifestCartridge
    - NotekeeperCartridge
    - NewsReaderCartridge
    - BountyContractsCartridge
    - AstroNavCartridge
  - type: Sprite
    sprite: _Mono/Objects/Devices/pda.rsi
    layers:
    - map: [ "enum.PdaVisualLayers.Base" ]
      state: "pda"
    - state: "light_overlay"
      map: [ "enum.PdaVisualLayers.Flashlight" ]
      shader: "unshaded"
      visible: false
    - state: "id_overlay"
      map: [ "enum.PdaVisualLayers.IdLight" ]
      shader: "unshaded"
      visible: false
  - type: Icon
    sprite: _Mono/Objects/Devices/pda.rsi
    state: pda

- type: entity
  parent: BaseUSSPPDA
  id: USSPRiflemanPDA
  name: USSP rifleman PDA
  components:
  - type: Pda
    id: USSPRiflemanIDCard
  - type: Appearance
    appearanceDataInit:
      enum.PdaVisuals.PdaType:
        !type:String
        pda-ussprifleman
  - type: Geiger # Mono
    showExamine: true
    showControl: true
    isEnabled: true
    attachedToSuit: true # Mono


