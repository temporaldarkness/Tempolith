    unpoweredBonus: 7
    powerModifier: 0.25
    damageOverloadTimePunishment: 45
    shieldColor: "#FF9933"
    collisionResistanceMultiplier: 0.0
  - type: Sprite
    sprite: _Mono/Structures/ShuttleComponents/fobshield.rsi
    snapCardinals: true
    layers:
