  description: Allows for long-range combat. Unwieldy and hard to recover from after recoil.
  components:
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Attachments/Optics/scopes.rsi
    state: erebus_8x
  - type: ESGunComponentAttachment
    component:
    - type: CursorOffsetRequiresWield
    - type: EyeCursorOffset
      maxOffset: 6
      pvsIncrease: 0.9
  - type: ESGunRecoilAttachment
    recoilRecoveryModifier: 0.4
    recoilIncreaseModifier: 1
    minSpreadModifier: 0.7
    maxSpreadModifier: 0.7
  - type: Tag
    tags:
    - MonoOptic
    - MonoOptic8x
    - MonoOpticErebusRailmount
