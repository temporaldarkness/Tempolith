- type: entityTable
  id: ExodusSyndicateShipsTable
  table: !type:AllSelector
    children:
    - id: UnknownShuttleSyndicateInfiltrator
    - id: UnknownShuttleSyndicateKlesh

- type: entity
  id: ExodusSyndicateScheduler
  parent: BaseGameRule
  components:
  - type: BasicStationEventScheduler
    scheduledGameRules: !type:NestedSelector
      tableId: ExodusSyndicateShipsTable
    minimumTimeUntilFirstEvent: 3600 # 1 hour
    minMaxEventTiming:
      min: 1800 # 30 minutes
      max: 3600 # 1 hour

- type: entity
  parent: BaseRandomShuttleRule
  id: UnknownShuttleSyndicateInfiltrator
  components:
  - type: StationEvent
    startAnnouncement: station-event-syndicate-infiltrator-detected
    startAudio:
      path: /Audio/Misc/notice1.ogg
    weight: 2
    maxOccurrences: 1
  - type: LoadMapRule
    gridPath: /SharedMaps/_Exodus/Shuttles/Syndicate/infiltrator_ghost.yml
  - type: GameRuleRequirements
    requirements:
    - !type:JobGameRuleRequirement
      department: Combatant
      minDepartmentPlayers: 6

- type: entity
  parent: BaseRandomShuttleRule
  id: UnknownShuttleSyndicateKlesh
  components:
  - type: StationEvent
    startAnnouncement: station-event-syndicate-klesh-detected
    startAudio:
      path: /Audio/Misc/notice1.ogg
    weight: 2.5
    maxOccurrences: 2
  - type: LoadMapRule
    gridPath: /SharedMaps/_Exodus/Shuttles/Syndicate/klesh_ghost.yml
  - type: GameRuleRequirements
    requirements:
    - !type:JobGameRuleRequirement
      department: Combatant
      minDepartmentPlayers: 4
