- type: entity
  parent: EncryptionKey
  id: EncryptionKeyUssp
  name: USSP encryption key
  description: An encryption key for the USSP tactical-level communications channel.
  components:
  - type: EncryptionKey
    channels: # Exodus
    - channel: Ussp
    defaultChannel: Ussp
  - type: Item
    sprite: Objects/Devices/encryption_keys.rsi
  - type: Sprite
    sprite: Objects/Devices/encryption_keys.rsi
    layers:
    - state: crypt_rusted
    - state: sec_label

- type: entity
  parent: EncryptionKey
  id: EncryptionKeyUsspCommand
  name: USSP command encryption key
  description: An encryption key for the USSP command channel. Due to USSP higher-level networking being defunct, it instead provides access to tactical command.
  components:
  - type: EncryptionKey
    channels: # Exodus
    - channel: Ussp
    defaultChannel: Ussp
  - type: Item
    sprite: Objects/Devices/encryption_keys.rsi
  - type: Sprite
    sprite: Objects/Devices/encryption_keys.rsi
    layers:
    - state: crypt_blue
    - state: sec_label

- type: entity
  parent: EncryptionKey
  id: EncryptionKeyVanguardCommand
  name: vanguard command encryption key # mono
  description: An encryption key used by officers in the vanguard. # Mono
  components:
    - type: EncryptionKey
      channels: # Exodus
        - channel: VanguardCommand
      defaultChannel: VanguardCommand
    - type: Sprite
      layers:
        - state: crypt_blue
        - state: pirate_label

# Overseer variant w/ no TSFMC or TSF command radio key

- type: entity
  parent: EncryptionKeyStationMaster
  id: EncryptionKeyStationMasterSR
  components:
  - type: EncryptionKey
    channels: # Exodus
    - channel: Engineering
      canSpeak: false
    - channel: Medical
    - channel: Science
      canSpeak: false
    - channel: Security
    - channel: Service
    - channel: Supply
      canSpeak: false
    - channel: Traffic
    defaultChannel: Security # Exodus

 # Diplomacy with faction heads, seperated from master key to allow toggling off
- type: entity
  parent: EncryptionKeyStationMaster
  id: EncryptionKeyDiplomacy
  name: diplomatic encryption key
  description: A direct communications channel to the heads of the sector's warring states.
  components:
  - type: EncryptionKey
    channels: # Exodus
    - channel: Command
    - channel: VanguardCommand
    #- Nfsd #Deliberately excluded: You don't command them
    #- Freelance
    defaultChannel: Command

- type: entity
  parent: EncryptionKey
  id: EncryptionKeyViper
  name: ViperGroup encryption key
  description: An encryption key for the Viper Group tactical-level communications channel.
  components:
  - type: EncryptionKey
    channels: # Exodus
    - channel: Viper
    defaultChannel: Viper
  - type: Item
    sprite: _Mono/Objects/Devices/encryption_keys.rsi
  - type: Sprite
    sprite: _Mono/Objects/Devices/encryption_keys.rsi
    layers:
    - state: crypt_red
    - state: viper_label

- type: entity
  parent: EncryptionKey
  id: EncryptionKeyFreeport
  name: Freeport encryption key
  description: A worn encryption key for Freeport communications, allowing the varied groups of Freeport to engage in diplomacy or yell insults, likely the latter.
  components:
  - type: EncryptionKey
    channels: # Exodus
    - channel: Freeport
    defaultChannel: Freeport
  - type: Item
    sprite: Objects/Devices/encryption_keys.rsi
  - type: Sprite
    sprite: Objects/Devices/encryption_keys.rsi
    layers:
    - state: crypt_rusted
    - state: cargo_label
