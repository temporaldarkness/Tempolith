- type: vessel
  id: Sentinel
  parent: BaseVesselAntag
  name: Центинел # Ru-Localization
  description: Бронированный корвет с двумя носовыми орудиями Бофорс, четырьмя плазменными пушками Мародёр и двумя кормовыми 20-мм орудиями Л85 для обороны. # Ru-Localization
  price: 210200 # Appraises around 100k, but marked up since appraisegrid is too stupid to realize the true value of my creations (plastitanium walls probably has their value set really low)
  purchasable: false # voucher only
  category: Medium
  group: Security
  access: Security
  shuttlePath: /SharedMaps/_Exodus/Shuttles/TSFCM/sentinel.yml # Exodus
