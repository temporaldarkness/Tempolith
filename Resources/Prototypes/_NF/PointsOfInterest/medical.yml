# Notes:
# Medical ship garage, medical manager base and medical bounty staging area.
- type: pointOfInterest
  id: Medical
  parent: [BasePOI, BaseRepairablePOI]
  name: 'Госпиталь' # Ru-Localization
  minimumDistance: 6000 # Exodus-nebula-update
  maximumDistance: 8000 # Exodus-nebula-update
  spawnGroup: Required
  gridPath: /Maps/_Exodus/POI/hospital.yml # Exodus-Change
  addComponents:
  - type: IFF
    color: "#00b7eb"
  - type: StationTransit
  - type: Zone # Exodus - SafeZone
    text: "zone-safezone"
  - type: Tower7G

- type: gameMap
  id: Medical
  mapName: 'Госпиталь' # Ru-Localization
  mapPath: /Maps/_Exodus/POI/hospital.yml # Exodus-Change
  minPlayers: 0
  stations:
    Medical:
      stationProto: RecordsFrontierOutpost
      # Exodus start - Territory for Medical Center
      gridComponents:
      - type: GridTerritory
        defaultLabel: territory-marker-hospital # Exodus territory-hospital-label
      # Exodus end
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Госпиталь' # Ru-Localization
        - type: ExtraStationInformation
          icon:
            sprite: _NF/Markers/jobs.rsi
            state: medic
          stationSubtext: 'frontier-lobby-medical-subtext'
          stationDescription: 'frontier-lobby-medical-description'
          lobbySortOrder: 4
        - type: StationJobs
          availableJobs:
            DirectorOfCare: [ 1, 1 ]
            MdMedic: [ -1, -1 ] # mono
            Pilot: [ -1, -1 ]
            Mercenary: [ -1, -1 ]
          tags:
          - HeadOfPersonnel
          - HeadOfSecurity
        - type: StationDeadDrop
          maxDeadDrops: 1 # Fewer here, players start here.
