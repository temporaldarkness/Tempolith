- type: vessel
  id: Inertia
  parent: BaseVessel
  name: Инерция # Ru-Localization
  description: Шаттл с высокой манёвренностью и двумя Драупнирами для отвлечениря огня врага. # Ru-Localization
  limit: 6
  price: 15000
  purchasable: false #voucher only
  category: Small
  group: Custom
  mapchecker_group_override: Shipyard  # Treat this as a Shipyard vessel for mapchecker purposes
  shuttlePath: /SharedMaps/_Mono/Shuttles/Carrier/inertia.yml
  guidebookPage: Null
  class:
  - Fighter
  - Pursuit
  engine:
  - APU

- type: gameMap
  id: Inertia
  mapName: 'Инерция' # Ru-Localization
  mapPath: /SharedMaps/_Mono/Shuttles/Carrier/inertia.yml
  minPlayers: 0
  stations:
    Inertia:
      stationProto: StandardFrontierVessel
      components:
      - type: StationNameSetup
        mapNameTemplate: 'Инерция{1}' # Ru-Localization
        nameGenerator:
          !type:NanotrasenNameGenerator
          prefixCreator: '14'
      - type: StationJobs
        availableJobs: {}
