        stampedName: stamp-component-stamped-name-stc
      content: >2-

        [head=3]Бланк документа Аванпоста Колосс-Централ[/head]


        [head=2]═════════════════════════════[/head]

        [head=1]      Лицензия на транзит[/head]

        [head=2]═════════════════════════════[/head]


        [bold]Судно:[/bold] [bold][color=Navy]PS-225-1[/color][/bold]

        [bold]Ф.И.О.:[/bold] [bold][color=Navy]Дэвид Марвонс-Старший[/color][/bold]

        [bold]Должность:[/bold] [italic][color=Navy]Капитан судна[/color][/italic]

        [bold]Время действия лицензии:[/bold] [italic][color=Navy]С момента прибытия в сектор до окончания транзита.[/color][/italic]


        [bold]Эта лицензия предоставляет официальное разрешение на трансфер сквозь сектор, а также осуществление стыковки к секториальному аванпосту для пополнения личных запасов судна.[/bold]


        [bold]Оплата: 100 000 кредитов (сто тысяч кредитов)[/bold]


        [mono][color=DarkGray]В случае неуведомления сектора, включая аванпост, о прибытии предусмотрен штраф в 25% от стоимости документа.[/mono][/color]



        [mono][color=DarkGray]К бумаге прилагается кейс для диска с координатами сектора.[/mono][/color]


        [mono][color=DarkGray]Данная форма недействительна без подписи и/или печати диспетчера аванпоста сектора.[/color][/mono]

        [head=2]═════════════════════════════[/head]

