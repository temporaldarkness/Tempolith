- type: entity
  name: BaseWeaponRifle
  parent: [BaseItem, BaseGunWieldable]
  id: BaseWeaponRifle
  description: A rooty tooty point and shooty.
  abstract: true
  components:
  - type: Sprite
  - type: Item
    size: Huge
  - type: Clothing
    sprite: Objects/Weapons/Guns/Rifles/ak.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: AmmoCounter
  - type: Gun
    fireRate: 5
    projectileSpeed: 55 # Mono
    selectedMode: FullAuto
    availableModes:
      - FullAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/batrifle.ogg
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/sf_rifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine762x39mmFMJ
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - Magazine762x39mmFMJ
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge762x39mmFMJ
        priority: 1
        whitelist:
          tags:
            - Cartridge762x39mmFMJ
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: StaticPrice
    price: 500
  - type: ItemTax # Mono
    taxAccounts:
      nfsd: 0.2
  - type: WieldedCrosshair
    rsi:
      sprite: _RMC14/Interface/MousePointer/rifle_mouse.rsi
      state: all
  # Goobstation edit start
  - type: EmitSoundOnPickup
    sound:
      collection: RiflesPickUp
  - type: EmitSoundOnDrop
    sound:
      collection: RiflesDrop
  - type: EmitSoundOnLand
    sound:
      collection: RiflesDrop
  # Goobstation edit end

- type: entity
  name: LWC AKM (7.62x39mm)
  parent: BaseWeaponRifle
  id: WeaponRifleAk
  description: An old Pre-Fracture Era rifle. Uses 7.62x39mm ammo. When the Fracture began to spread across the Old Earth territories, few weapons were as reliable as the AKM
  components:
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Rifles/akm.rsi # Mono
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Item # Mono
    sprite: _Mono/Objects/Weapons/Guns/Rifles/akm_inhands_32x.rsi
  - type: Clothing
    sprite: _Mono/Objects/Weapons/Guns/Rifles/akm_inhands_32x.rsi # Mono
  - type: Gun
    fireRate: 5
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/rifle2.ogg
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/ltrifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine762x39mmFMJ
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - Magazine762x39mmFMJ
            - Magazine762x39mmLowCapacityFMJ
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge762x39mmFMJ
        priority: 1
        whitelist:
          tags:
            - Cartridge762x39mmFMJ
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: PirateBountyItem # Frontier
    id: AKM # Frontier

- type: entity
  name: TCA M-6 Lecter (6.8x52mm Caseless)
  parent: BaseWeaponRifle
  id: WeaponRifleLecter
  description: The result of a project to make a new standard rifle for the branches of the TSF military. Accurate, easy to use, and firing the 6.8x52mm STANAG round. Also accepts 5.56x45mm magazines to assist with standardization. The barrel is threaded for suppressors, and an Erebus railmount is on the bottom for grips.
  components:
  - type: Item # Mono
    size: Huge
    sprite: _Mono/Objects/Weapons/Guns/Rifles/lecter_inhands_32x.rsi
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Rifles/lecter.rsi # Mono
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
      - map: ["gripAttachment"] # Mono
      - map: ["barrelAttachment"] # Mono
      - map: ["opticAttachment"] # Mono
  - type: Clothing
    sprite: _Mono/Objects/Weapons/Guns/Rifles/lecter_inhands_32x.rsi
  - type: ChamberMagazineAmmoProvider # Mono
    soundRack:
      path: /Audio/Weapons/Guns/Cock/sf_rifle_cock.ogg
  - type: Gun
    fireRate: 6 # Mono
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/SmallArms/Gunshots/light_rifle_1.ogg # Mono
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine68x52mmCaseless # Mono
        insertSound: /Audio/_Mono/Weapons/Guns/SmallArms/MagIn/m16_magin.ogg # Mono
        ejectSound: /Audio/_Mono/Weapons/Guns/SmallArms/MagOut/skm_magout.ogg # Mono
        priority: 2
        whitelist:
          tags:
            - Magazine68x52mmCaseless # Mono
            - Magazine556x45mmFMJ # Mono
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge68x52mmCaseless # Mono
        priority: 1
        whitelist:
          tags:
            - Cartridge68x52mmCaseless # Mono
            - Cartridge556x45mmFMJ # Mono
      # Mono
      attachment_grip:
        insertSound: /Audio/Items/screwdriver2.ogg
        ejectSound: /Audio/Items/screwdriver2.ogg
        priority: 0
        whitelist:
          tags:
          - MonoGripErebusRailmount
      # Mono
      attachment_barrel:
        insertSound: /Audio/Items/screwdriver.ogg
        ejectSound: /Audio/Items/screwdriver.ogg
        priority: 0
        whitelist:
          tags:
          - MonoSuppressorMulticalRifle
      # Mono
      attachment_optic:
        insertSound: /Audio/Items/screwdriver2.ogg
        ejectSound: /Audio/Items/screwdriver2.ogg
        priority: 0
        whitelist:
          tags:
          - MonoOpticErebusRailmount
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
      attachment_grip: !type:ContainerSlot # Mono
      attachment_barrel: !type:ContainerSlot # Mono
      attachment_optic: !type:ContainerSlot # Mono
  # Mono start
  - type: ESAttachableGun
    slots:
    - name: es-gun-attachments-slot-name-barrel
      containerId: attachment_barrel
      whitelist:
        tags:
        - MonoSuppressorMulticalRifle
    - name: es-gun-attachments-slot-name-grip
      containerId: attachment_grip
      whitelist:
        tags:
        - MonoGripErebusRailmount
    - name: es-gun-attachments-slot-name-optic
      containerId: attachment_optic
      whitelist:
        tags:
        - MonoOpticErebusRailmount
  - type: ActivatableUI
    key: enum.ESAttachableGunUiKey.Key
    verbOnly: true
    verbText: es-gun-attachments-verb-text
  - type: UserInterface
    interfaces:
      enum.ESAttachableGunUiKey.Key:
        type: ESGunAttachmentBui
  - type: ESItemMapper
    mappings:
      gripAttachment:
      - containerId: attachment_grip
        state: grip
        whitelist:
          tags:
          - MonoGripVFG
      - containerId: attachment_grip
        state: lam
        whitelist:
          tags:
          - MonoGripLAM
      - containerId: attachment_grip
        state: light
        whitelist:
          tags:
          - MonoGripLight
      barrelAttachment:
      - containerId: attachment_barrel
        state: suppressed
        whitelist:
          tags:
          - MonoSuppressor
      opticAttachment:
      - containerId: attachment_optic
        state: optic2x
        whitelist:
          tags:
          - MonoOptic2x
      - containerId: attachment_optic
        state: optic4x
        whitelist:
          tags:
          - MonoOptic4x
      - containerId: attachment_optic
        state: optic8x
        whitelist:
          tags:
          - MonoOptic8x
  # Mono end
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: StaticPrice # Mono
    price: 750
  - type: PirateBountyItem # Mono
    id: StandardFactionLongarm

- type: entity
  name: Foam Force Astro Ace
  parent: [BaseWeaponShotgun, BaseGunWieldable]
  id: WeaponRifleFoam
  description: A premium foam rifle of the highest quality. Its plastic feels rugged, and its mechanisms sturdy.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Rifles/foam_rifle.rsi
  - type: Clothing
    sprite: Objects/Weapons/Guns/Rifles/foam_rifle.rsi
  - type: Item
    sprite: Objects/Weapons/Guns/Rifles/foam_rifle_inhand_64x.rsi
  - type: BallisticAmmoProvider
    whitelist:
      tags:
      - BulletFoam
    capacity: 10
    proto: BulletFoam
  - type: GunRequiresWield #remove when inaccuracy on spreads is fixed
  - type: Gun
    fireRate: 2
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Effects/thunk.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/empty.ogg
    clumsyProof: true
  - type: PacifismAllowedGun
