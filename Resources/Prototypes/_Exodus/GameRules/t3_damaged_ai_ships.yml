- type: entityTable
  id: ExodusT3ShipsTable
  table: !type:AllSelector
    children:
    - id: UnknownShuttleAzimuth
    - id: UnknownShuttleStratostar

- type: entity
  id: ExodusT3ShipsScheduler
  parent: BaseGameRule
  components:
  - type: BasicStationEventScheduler
    scheduledGameRules: !type:NestedSelector
      tableId: ExodusT3ShipsTable
    minimumTimeUntilFirstEvent: 7200 # 2 hours
    minMaxEventTiming:
      min: 3600 # fixed 60 minutes between attempts
      max: 3600

- type: entity
  id: ExodusT3ShipsSchedulerSlow
  parent: BaseGameRule
  components:
  - type: BasicStationEventScheduler
    scheduledGameRules: !type:NestedSelector
      tableId: ExodusT3ShipsTable
    minimumTimeUntilFirstEvent: 16200 # 4.5 hours — MonoMixed only
    minMaxEventTiming:
      min: 3600
      max: 3600

- type: entity
  parent: BaseRandomShuttleRule
  id: UnknownShuttleAzimuth
  components:
  - type: StationEvent
    startAnnouncement: station-event-ai-cruiser-detected
    startAudio:
      path: /Audio/_Exodus/Asakim/Announcements/azimuth.ogg
    weight: 1.5
    maxOccurrences: 1
  - type: GameRule
    minPlayers: 40
  - type: LoadMapRule
    gridPath: /Maps/_Exodus/ShuttleEvent/azimuth.yml
  - type: GameRuleRequirements
    requirements:
    - !type:JobGameRuleRequirement
      department: Combatant
      minDepartmentPlayers: 6
    - !type:MindWhitelistedPlayersRequirement
      minPlayers: 1
      whitelist:
        mindRoles: [ AsakimRole ]

- type: entity
  parent: BaseRandomShuttleRule
  id: UnknownShuttleAzimuthApoc
