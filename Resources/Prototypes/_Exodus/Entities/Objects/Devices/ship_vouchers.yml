- type: entity
  parent: BaseShipLPC
  id: ShipVoucherLadya
  name: TSF ladya LPC
  description: A small card that contains the data for the procurement of a Ladya-class supporter from the flagship's reserves.
  components:
  - type: Sprite
    layers:
    - state: icon_capital
    - state: screen
      color: "#05ffff"
    - state: screen4
      color: "#05ffff"
      shader: unshaded
  - type: ShipyardVoucher
    destroyOnEmpty: true
    consoleType: Security
    companyName: TSF
    vessels:
    - Ladya
  - type: StaticPrice
    vendPrice: 200000

