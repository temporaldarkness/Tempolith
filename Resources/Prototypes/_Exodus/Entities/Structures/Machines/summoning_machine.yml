- type: entity
  id: SummoningMachine
  parent: BaseMachinePowered
  placement:
    mode: AlignTileAny
  components:
  - type: Transform
    anchored: true
    noRot: true
  - type: Sprite
    sprite: _Exodus/Structures/Machines/GiantUplinkGateway.rsi
    layers:
    - state: GiantUplinkGateway
      map: [ "enum.SummoningMachineVisualLayers.Base" ]
    - state: GiantUplinkGateway_Inactive
      map: [ "enum.SummoningMachineVisualLayers.State" ]
      shader: unshaded
    - state: GiantUplinkGateway_Emission
      map: [ "enum.SummoningMachineVisualLayers.Emission" ]
      shader: unshaded
      visible: false
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.SummoningMachineVisuals.State:
        enum.SummoningMachineVisualLayers.State:
          Inactive: { state: GiantUplinkGateway_Inactive }
          Idle: { state: GiantUplinkGateway_Idle }
          Working: { state: GiantUplinkGateway_Working }
        enum.SummoningMachineVisualLayers.Emission:
          Inactive: { visible: false }
          Idle: { visible: false }
          Working: { visible: true }
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-2.5,-2.5,2.5,2.5"
        density: 250
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: ApcPowerReceiver
    powerLoad: 250000
  - type: PowerCharge
    windowTitle: summoning-machine-ui-title
    charge: 0
    chargeRate: 0.05
    idlePower: 0
    activePower: 250000
  - type: Biocode
    whitelist:
      components: [ AsakimTrustedUser ]
    mindWhitelist:
      mindRoles: [ AsakimRole ]
  - type: ActivatableUI
    key: enum.StoreUiKey.Key
  - type: ActivatableUIRequiresPower
  - type: UserInterface
    interfaces:
      enum.StoreUiKey.Key:
        type: StoreBoundUserInterface
  - type: Store
    name: summoning-machine-ui-title
    categories:
    - SummoningMachinePrefractureRelics
    - SummoningMachineKasatura
    - SummoningMachineZeroGVector
    - SummoningMachineTechnicalContour
    - SummoningMachineEmergencyBeacons
    - SummoningMachineFieldReserve
    currencyWhitelist:
    - Telecrystal
    balance:
      Telecrystal: 0
  - type: TerritoryStoreDiscount
    faction: Khsira
  - type: NoDeconstruct
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 2000
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Repairable
    fuelCost: 15
    doAfterDelay: 10
  - type: ShipRepairable
    repairTime: 12
    repairCost: 25
  - type: StaticPrice
    price: 0
  - type: SummoningMachine
