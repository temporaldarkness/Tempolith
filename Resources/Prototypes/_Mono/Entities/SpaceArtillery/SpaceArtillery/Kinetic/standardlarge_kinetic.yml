
# Cyrexa 220mm

- type: entity
  id: WeaponTurretCyrexa
  name: CYREXA 220mm cannon
  parent:
  - BallisticArtilleryCartridge # Exodus turret-anchorable (no RequiresGrid)
  - ShipGunTier4HpExploding # Exodus self-destruct (HP, was BallisticArtilleryTier4HP)
  - ShipGunExplodes5x5 # Exodus self-destruct (blast size)
  suffix: Large, T4
  description: A main battery with dual barrels, delivering rapid, punishing salvos at extreme range. Fires 220mm auto shells with slightly reduced brute strength. Can be remotely activated or linked up to a GCS.
  components:
  - type: StaticPrice
    price: 15000
  - type: Sprite
    sprite: _Mono/Objects/ShuttleWeapons/cyrexa.rsi
    layers:
    - state: space_artillery
    scale: 1, 1
  - type: Appearance
  - type: FireControlRotate
  - type: AmmoCounter
  - type: WirelessNetworkConnection
    range: 500
  - type: GunSignalControl
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.6,-0.6,0.6,0.6"
        density: 1500
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Gun
    projectileSpeed: 275
    minAngle: 0
    maxAngle: 1
    fireRate: 0.2
    recoil: 50 # 2x
    burstCooldown: 10
    burstFireRate: 2
    shotsPerBurst: 2
    selectedMode: Burst
    availableModes: Burst
    shootThermalSignature: 48000000 # ~7km after firing
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/Gunshots/cannon.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/lmg_empty.ogg
  - type: SpaceArtillery
    powerChargeRate: 12000
    powerUsePassive: 1500
    powerUseActive: 0
  - type: Actions
  - type: RadarBlip
    radarColor: "#FF0000"
    scale: 2
    visibleFromOtherGrids: true
    gridConfig:
      color: "#FF0000"
      shape: Square
      respectZoom: true
      rotate: true
      bounds: "-1.5,-1.5,1.5,1.5"
  - type: BallisticAmmoProvider
    infiniteUnspawned: true
    whitelist:
      tags:
      - 220mmCartridge
    capacity: 24
    proto: 220mmCartridgeAPHE
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
  - type: ShipGunType
    shipType: Ballistic
  - type: ShipGunClass
    shipClass: Medium
  - type: ShipRepairable
    repairTime: 30
    repairCost: 150

# AK820 120mm

- type: entity
  id: WeaponTurretAk820
  name: AK820 120mm autocannon
  parent:
  - BallisticArtilleryUnanchorableCartridge
  - BallisticArtilleryTier4HP
  suffix: Large, T4
  description: Large hard hitting naval gun for steady damage. Fires APHEDS rounds, allowing for enhanced penetration, but not as much explosive power as full-sized APHE rounds. Feeds from an 96 round internal magazine.
