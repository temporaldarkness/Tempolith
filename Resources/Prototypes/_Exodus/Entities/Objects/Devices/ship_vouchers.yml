- type: entity
  parent: BaseShipLPCRenewable
  id: ShipVoucherLadya
  name: TSF ladya LPC
  description: A small card that contains the data for the procurement of a Ladya-class supporter from the flagship's reserves.
  components:
  - type: Sprite
    layers:
    - state: icon_capital
    - state: screen
      color: "#05ffff"
    - state: screen4
      color: "#05ffff"
      shader: unshaded
  - type: ShipyardVoucher
    destroyOnEmpty: true
    consoleType: Security
    companyName: TSF
    vessels:
    - Ladya
  - type: StaticPrice
    vendPrice: 200000

- type: entity
  parent: BaseShipLPCRenewable
  id: ShipVoucherFerz
  name: PDV ferz LPC
  description: A small card that authorizes the procurement of a Ferz.
  components:
  - type: Sprite
    layers:
    - state: icon_capital
    - state: screen
      color: "#1eff00"
    - state: screen5
      color: "#1eff00"
      shader: unshaded
  - type: ShipyardVoucher
    destroyOnEmpty: true
    consoleType: BlackMarket
    companyName: PDV
    vessels:
    - Ferz
  - type: StaticPrice
    vendPrice: 325000
