- type: entity
  id: BaseDataFarmIndestructible
  parent: BaseMachineIndestructible
  name: base datafarm
  abstract: true
  components:
  - type: Sprite
    sprite: _Mono/Structures/Machines/neapolitan_server.rsi
    layers:
    - state: icon
    - state: unlit
      shader: unshaded
      map: [ "enum.PowerDeviceVisualLayers.Powered" ]
    - state: stripe
      color: "#b3aa79"
    - state: stripe2
      color: "#5b0093"
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        enum.PowerDeviceVisualLayers.Powered:
          True: {visible: true}
          False: {visible: false}
  - type: ApcPowerReceiver
    powerLoad: 40000
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallic
  - type: PassiveThermalSignature
    signature: 8000000 # ~8km
  - type: ThermalSignature
  - type: ExtensionCableReceiver
  - type: LightningTarget
    priority: 1

- type: entity
  id: BaseDataFarm
  parent: BaseDataFarmIndestructible
  name: base datafarm
  abstract: true
  components:
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
  - type: Anchorable

# Exodus - DataFarmRefactor - Start
- type: entity
  id: BaseDataFarmResearch
  parent: BaseDataFarm
  abstract: true
  components:
  - type: Sprite
    sprite: _Exodus/Structures/Machines/datafarm_research.rsi
    layers:
    - sprite: Structures/Piping/Atmospherics/pipe.rsi
      state: pipeStraight
      map: [ "enum.PipeVisualLayers.Pipe" ]
      offset: 0, -0.2
    - map: ["enum.DataFarmVisualLayers.State"]
      state: DatafarmResearch-off
      offset: 0, 0.1
    - map: ["enum.DataFarmVisualLayers.Light"]
      state: null
      shader: unshaded
      offset: 0, 0.1
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.DataFarmVisuals.State:
        enum.DataFarmVisualLayers.State:
          Off: { state: DatafarmResearch-off }
          Process: { state: DatafarmResearch-on-proces }
          Normal: { state: DatafarmResearch-on-normal }
          Warning: { state: DatafarmResearch-on-notgood }
          Destruct: { state: DatafarmResearch-on-destract }
        enum.DataFarmVisualLayers.Light:
          Process: { state: DatafarmResearch-on-proces-light }
          Normal: { state: DatafarmResearch-on-normal-light }
          Warning: { state: DatafarmResearch-on-notgood-light }
          Destruct: { state: DatafarmResearch-on-destract-light }
  - type: ResearchClient
  - type: ActivatableUI
    key: enum.ResearchClientUiKey.Key
  - type: ActivatableUIRequiresPower
  - type: UserInterface
    interfaces:
      enum.ResearchClientUiKey.Key:
        type: ResearchClientBoundUserInterface
  - type: PointLight
    radius: 1
    energy: 1
    color: "#5b0093"
  - type: GuideHelp
    guides:
    - Science
  - type: ResearchPointSource
    pointsPerSecond: 25
    active: true
  - type: AtmosDevice
  - type: NodeContainer
    nodes:
      inlet:
        !type:PipeNode
        nodeGroupID: Pipe
        pipeDirection: South
  - type: DataFarm
    inletName: inlet
    cycleDuration: 1.0
    intakePerSecond: 10.0

- type: entity
  id: DatafarmResearchFaction
  parent: BaseDataFarmIndestructible
  name: bolted data farm (Research)
  description: A power-hungry server dedicated towards scraping data from... somewhere. This one generates research points at a rate of 200 per second. It seems to be bolted to the floor.
  components:
  - type: ResearchClient
  - type: ResearchPointSource
    pointsPerSecond: 200
    active: true
  - type: ApcPowerReceiver
    powerLoad: 10000

- type: entity
  id: DatafarmResearch
  parent: [BaseDataFarmResearch, ConstructibleMachine]
  name: data farm (Research)
  description: A power-hungry server dedicated towards scraping data from... somewhere. This one generates research points at a rate of 20 per second.
  components:
  - type: PointLight
    radius: 1.1
    energy: 1.1
  - type: Machine
    board: DataFarmResearchCircuitboard

