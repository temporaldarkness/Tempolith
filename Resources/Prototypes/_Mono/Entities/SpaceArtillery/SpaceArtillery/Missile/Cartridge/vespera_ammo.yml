- type: entity
  id: MissileMagazine50mmHE
  name: "Vespera 50mm HE missile autoloader"
  parent: [BaseItem, RecyclableItemSteelTiny]
  components:
  - type: Tag
    tags:
    - MissileMagazine50mm
  - type: Item
    size: Small
  - type: BallisticAmmoProvider
    proto: MissileCartridge50mmHE
    capacity: 78
    mayTransfer: true
    whitelist:
      tags:
      - MissileCartridge50mm
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Ammunition/Boxes/generic_shipgun_box.rsi
    layers:
    - state: base
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-0
      map: [ "enum.GunVisualLayers.Mag" ]
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: false
  - type: Appearance

- type: entity
  id: MissileCartridge50mmHE
  name: 50mm HE missile
  description: An individual ADMP-50 high-explosive missile for a 50mm missile launcher.
  parent: BaseGrenade
  components:
  - type: Tag
    tags:
    - MissileCartridge50mm
  - type: Item
    size: Huge
  - type: CartridgeAmmo
    proto: MissileProjectile50mmHE
    deleteOnSpawn: true
    muzzleFlash: null
  - type: Sprite
    sprite: _Mono/Objects/SpaceArtillery/mini_rocket.rsi
    layers:
    - state: mini-rocket
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 250
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:ExplodeBehavior
  - type: Explosive
    explosionType: Default
    maxIntensity: 100
    intensitySlope: 3
    totalIntensity: 3
  - type: ExplodeOnTrigger
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
