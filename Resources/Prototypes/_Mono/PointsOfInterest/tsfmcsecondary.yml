# Notes:
# Exodus nebula-poi-migration: pointOfInterest removed, spawns inside Blue / Purple nebulas via
# NebulaPoiSpawnSystem; see Resources/Prototypes/_Exodus/Nebula/pois.yml. gameMap kept (job
# slots and lobby info live here).

- type: gameMap
  id: TSFMCOutpost
  mapName: 'КВП | Периферийный аванпост' # Ru-Localization
  mapPath: /Maps/_Mono/POI/tsfmcoutpost.yml
  minPlayers: 0
  stations:
    TSFMCOutpost:
      stationProto: SecurityFrontierOutpost
      # Exodus start - Territory grid control for peripheral outpost
      gridComponents:
      - type: NpcFactionMember # Exodus faction-owned POI target filtering
        factions:
        - TSFMC
      - type: GridTerritory
      # Exodus end
      components:
        - type: StationNameSetup
          mapNameTemplate: 'КВП | Периферийный аванпост' # Ru-Localization
        - type: ExtraStationInformation
          icon:
            sprite: _NF/Structures/Decoration/banner.rsi
            state: nfsd-banner
          stationSubtext: 'frontier-lobby-tsfmc-secondary-subtext'
          stationDescription: 'frontier-lobby-tsfmc-secondary-description'
          lobbySortOrder: 2
        - type: StationJobs
          availableJobs:
            SeniorOfficer: [ 0, 3 ]
            Brigmedic: [ 0, 1 ]
            Deputy: [ -1, -1 ]
          tags:
          - HeadOfPersonnel
          - HeadOfSecurity
        - type: StationDeadDropHintExempt
