- type: vessel
  id: Tanuki
  parent: BaseVessel
  name: Тануки # Ru-Localization
  description: Тануки - это прочный милитаризированный грузовой шаттл. С лёгко модифицируемым грузовым отсеком и усиленной бронёй, он задуман как идеальная основа (и охотник на дронов) для ополченцев и независимых пилотов. Обладает внушительной лазерной огневой мощью для своих размеров, а именно у него два лазерных орудия Прометей для эффективного огня на дальних дистанциях и три Цербера для уничтожения врагов в ближнем бою. Оснащён небольшим камбузом и медотсеком - стандарт для кораблей ополчения. # Ru-Localization
  price: 115000 # 95K base + 20K for medical/galley.
  category: medium
  group: Shipyard
  access: Mercenary
  shuttlePath: /SharedMaps/_Mono/Shuttles/tanuki.yml
  addComponents:
  - type: NpcFactionMember # Exodus NanoTrasen faction
    factions:
    - NanoTrasen
  guidebookPage: Null
  class:
  - Pursuit
  engine:
  - Plasma

- type: gameMap
  id: Tanuki
  mapName: 'Тануки' # Ru-Localization
  mapPath: /SharedMaps/_Mono/Shuttles/tanuki.yml
  minPlayers: 0
  stations:
    Tanuki:
      stationProto: StandardFrontierVessel
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Тануки{1}' # Ru-Localization
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: StationJobs
          availableJobs:
