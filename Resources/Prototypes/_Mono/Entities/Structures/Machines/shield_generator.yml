    color: "#FF9933"
  # can repair it if you really want to
  - type: ShipRepairable
    repairTime: 30
    repairCost: 300
# Exodus-shield-swap-fix-start
  - type: Anchorable 
    flags:
    - None
# Exodus-shield-swap-fix-end

