# Jackhammer

- type: entity
  parent: [Clothing, ClothingSlotBase]
  id: ClothingBackpackJack
  name: GS-004-B Hammer ammo storage
  description: A heavy backpack made for carrying the GS-004-A's loading system.
  components:
  - type: Sprite
    sprite: _Mono/Clothing/Back/Backpacks/jack_backpack.rsi
    layers:
    - state: icon
      visible: false
    - state: base
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
    zeroNoAmmo: true
  - type: Clothing
    slots: BACK
    sprite: _Mono/Clothing/Back/Backpacks/jack_backpack.rsi
    clothingVisuals:
      back:
      - state: equipped-BACKPACK
      - state: equipped-BACKPACK-mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineAmmoProvider
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine4_gaugeBuckshot
        whitelist:
          tags:
          - Magazine4Gauge
  - type: Appearance
  - type: StaticPrice
    price: 500
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
  - type: Item
    size: Ginormous
  - type: Tag
    tags:
    - JackShotgunBackpack
    - WhitelistChameleon
  - type: ClothingSpeedModifier
    walkModifier: 0.55
    sprintModifier: 0.55
  - type: HeldSpeedModifier
