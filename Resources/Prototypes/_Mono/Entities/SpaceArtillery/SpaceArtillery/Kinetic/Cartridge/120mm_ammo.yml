- type: entity
  id: 120mmCartridgeAPHEDS
  name: 120mm APHEDS shell
  description: A chemically-propelled armor-piercing high-explosive discarding-sabot shell for 120mm cannons.
  parent: BaseGrenade
  components:
  - type: Tag
    tags:
    - 120mmCartridge
  - type: Item
    size: Huge
  - type: CartridgeAmmo
    proto: 120mmBulletAPHEDS
    deleteOnSpawn: true
    muzzleFlash: MuzzleFlashEffect120mm
  - type: Sprite
    sprite: _Mono/Objects/SpaceArtillery/shells.rsi
    layers:
    - state: 220mmAPHE
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 250
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:ExplodeBehavior
  - type: Explosive
    explosionType: Default
    maxIntensity: 20
    intensitySlope: 3
    totalIntensity: 10
  - type: ExplodeOnTrigger
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic

- type: entity
  id: 120mmBulletAPHEDS
  name: 120mm APHEDS projectile
  parent: BaseBulletTriggerSpent
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Structural: 200
        Piercing: 500
    penetrationThreshold: 5000
  - type: Sprite
    sprite: _Mono/Objects/SpaceArtillery/shells.rsi
    layers:
    - state: 220mmAPHE
  - type: Ammo
    muzzleFlash: MuzzleFlashEffect120mm
  - type: ShipWeaponProjectile
  - type: RadarBlip
    scale: 1.25
    shape: triangle
  - type: TimedDespawn
    lifetime: 8
  - type: PointLight
    color: "#FCBA03"
  - type: ExplodeOnTrigger
  - type: Explosive
    deleteAfterExplosion: false
    explosionType: Default
    totalIntensity: 10
    intensitySlope: 5
    maxIntensity: 5
    maxTileBreak: 2

- type: entity
  id: MuzzleFlashEffect120mm
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 0.4
  - type: Sprite
    drawdepth: BelowMobs
    layers:
    - shader: unshaded
      map: ["enum.EffectLayers.Unshaded"]
      sprite: _Mono/Objects/ShuttleWeapons/ak820.rsi
      state: muzzle_ak820
    scale: 2,2
    offset: 0.9, 0
  - type: EffectVisuals
  - type: Tag
    tags:
    - HideContextMenu
  - type: AnimationPlayer
