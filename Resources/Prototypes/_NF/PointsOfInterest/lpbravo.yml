# Notes:
# just a little loot n shoot POI. Pretty much the second POI to even exist.
#
# Exodus nebula-poi-migration:
# The original `pointOfInterest` entry was removed so that this POI no longer participates
# in the upstream NF round-start POI roulette (NfAdventureRuleSystem → PointOfInterestSystem).
# It is now spawned exclusively inside green nebulas via NebulaPoiSpawnSystem; see
# Resources/Prototypes/_Exodus/Nebula/pois.yml for the `NebulaPoiLPBravo` entry that carries
# the addComponents (IFF, SyndicateFOB, SolarPoweredGrid) and display name.
# The `gameMap` prototype below is kept so map validation tests / station registration still
# resolve the LPBravo id.

- type: gameMap
  id: LPBravo
  mapName: 'Прослушивающий Пункт Браво' # Ru-Localization
  mapPath: /Maps/_Exodus/POI/lpbravo.yml # Exodus Nebula Update
  minPlayers: 0
  stations:
    LPBravo:
      # FIXME: no records despite shipyard console, could currently be gamed
      stationProto: StandardFrontierOutpost
      # Exodus start - Syndicate-owned NPC target filtering
      gridComponents:
      - type: NpcFactionMember
        factions:
        - Syndicate
      # Exodus end
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Прослушивающий Пункт Браво' # Ru-Localization
        - type: StationJobs
          availableJobs: {}
        - type: StationDeadDropHintExempt
