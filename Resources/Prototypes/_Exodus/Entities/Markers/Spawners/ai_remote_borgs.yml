# Exodus: Map spawner markers for AI-remote-controlled borgs.
# Place these on a map so Station AI can take control of the borg from round start.

- type: entity
  name: AI remote borg spawner (NT)
  id: SpawnAiRemoteBorgBattery
  parent: MarkerBase
  components:
  - type: ConditionalSpawner
    prototypes:
    - AiRemoteBorgBattery
  - type: Sprite
    sprite: Markers/jobs.rsi
    layers:
    - state: green
    - sprite: Mobs/Silicon/chassis.rsi
      state: robot

