#TSFMC
- type: entity
  parent: ClothingHeadsetAlt
  id: ClothingHeadsetAltTsfmc
  name: TSFMC over-ear headset
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyCommon
      - EncryptionKeyNfsd
      - EncryptionKeyCommand
  - type: Sprite
    sprite: Clothing/Ears/Headsets/security.rsi
  - type: Clothing
    sprite: Clothing/Ears/Headsets/security.rsi

