- type: randomHumanoidSettings
  id: SyndicateGhostOperative
  parent: EventHumanoid
  randomizeName: false
  speciesBlacklist:
  - Vox
  - Asakim
  - IPC
  - Arachnid
  components:
  - type: GhostRole
    name: ghost-role-information-syndicate-operative-name
    description: ghost-role-information-syndicate-operative-description
    rules: ghost-role-information-syndicate-operative-rules
    mindRoles:
    - MindRoleGhostRoleNeutral
    - MindRoleNukeops
    raffle:
      settings: default
    requirements:
    - !type:OverallPlaytimeRequirement
      time: 54000 # 15 hrs
  - type: Loadout
    prototypes: [ SyndicateGhostOperativeGear ]
    roleLoadout: [ RoleSurvivalNukie ]
  - type: AutoImplant
    implants:
    - UplinkImplant
    - FreedomImplant
  - type: LanguageKnowledge
    speaks:
    - TauCetiBasic
    - Sign
    understands:
    - TauCetiBasic
    - Sign
  - type: RandomMetadata
    nameSegments:
    - random-metadata-name-syndicate-operative
    - SyndicateNamesNormal
  - type: NpcFactionMember
    factions:
    - Syndicate
  - type: NukeOperative
  - type: TTS
    voice: dragon_knight_dota_2

