  name: Баег # Ru-Localization
  description: По иронии судьбы названный так, этот шаттл крошечный, компактный и используется в основном для коротких вылазок или мелких добывающих операций КПБ... Или органиками, которые не поняли смысл названия, или просто отчаялись. # Ru-Localization
