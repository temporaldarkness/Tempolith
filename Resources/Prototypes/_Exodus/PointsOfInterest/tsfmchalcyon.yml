- type: pointOfInterest
  id: TSFMCHalcyon
  parent: [BasePOI, BaseRepairablePOI]
  name: 'КВП | Флагман Фалкон' # Ru-Localization
  minimumDistance: 15500 # Exodus-nebula-update
  maximumDistance: 25000 # Exodus-nebula-update
  spawnGamePreset: [ NFAdventure, NFPirate, MonoStandard, MonoRogueTSF, MonoRogueUSSP, MonoTSFUSSP, MonoADS, MonoChimera, MonoMixed, MonoAllAtOnce ] # Exodus paired faction POI spawn
  spawnGroup: PairedFactionPoi # Exodus paired faction POI spawn
  gridPath: /Maps/_Exodus/POI/tsfmchalcyon.yml # Exodus ai-remote-borgs
  addComponents:
  - type: IFF
    color: "#00a1fc"
    readOnly: true
  - type: NpcFactionMember # Exodus faction-owned POI target filtering
    factions:
    - TSFMC
  - type: SolarPoweredGrid
    doNotCull: true

- type: gameMap
  id: TSFMCHalcyon
  mapName: 'КВП | Флагман Фалкон' # Ru-Localization
  mapPath: /Maps/_Exodus/POI/tsfmchalcyon.yml # Exodus ai-remote-borgs
  minPlayers: 0
  randomRotation: false
  stations:
    TSFMCHalcyon:
      stationProto: SecurityFrontierOutpost
      gridComponents:
      - type: VesselInfo
        description: "Законсервированный военный корабль КВП, переоборудованный в передовую оперативную базу." # Ru-Localization
      - type: NpcFactionMember # Exodus faction-owned POI target filtering
        factions:
        - TSFMC
      # Exodus start - Territory for TSFMC Halcyon
      - type: GridTerritory
      # Exodus end
      components:
        - type: StationNameSetup
          mapNameTemplate: 'КВП | Флагман Фалкон' # Ru-Localization
        - type: ExtraStationInformation
          icon:
            sprite: _NF/Structures/Decoration/banner.rsi
            state: nfsd-banner
          stationSubtext: 'frontier-lobby-nfsd-subtext'
          stationDescription: 'frontier-lobby-nfsd-description'
          lobbySortOrder: 2
        - type: StationJobs
          availableJobs:
            Sheriff: [ 1, 1 ]
            Bailiff: [1, 1 ]
            SeniorOfficer: [ 3, 3 ] # Mono
            Brigmedic: [ 2, 2 ] # Mono
            Deputy: [ -1, -1 ] # Mono
            Cadet: [ 6, 6 ] # Exodus-Cadet-Return
            TsfEngineer: [ 2, 2 ]
            TsfBorg: [ 2, 2 ]
          tags:
          - HeadOfPersonnel
          - HeadOfSecurity
        - type: StationDeadDropReporting
          messageSet: Nfsd
        - type: StationDeadDropHintExempt

