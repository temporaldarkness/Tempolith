- type: entity
  id: NebulaThrusterMachineCircuitboard
  parent: BaseMachineCircuitboard
  name: phasic thruster machine board
  description: A machine board for a phasic thruster.
  components:
  - type: MachineBoard
    prototype: NebulaThruster
    requirements:
      Capacitor: 1
    stackRequirements:
      Steel: 5

- type: entity
  id: MachineGCSSuperCircuitboard
  parent: BaseMachineCircuitboard
  name: super-high-power gunnery control server board
  description: A machine board for a GCS.
  components:
  - type: Sprite
    state: security
  - type: MachineBoard
    prototype: GunneryServerSuper
    requirements:
      Capacitor: 2
      Manipulator: 2
    stackRequirements:
      Glass: 10
      Steel: 10

- type: entity
  id: MachineGCSAlfaCircuitboard
  parent: BaseMachineCircuitboard
  name: alfa-high-power gunnery control server board
  description: A machine board for a GCS.
  components:
  - type: Sprite
    state: security
  - type: MachineBoard
    prototype: GunneryServerAlfa
    requirements:
      Capacitor: 2
      Manipulator: 2
    stackRequirements:
      Glass: 10
      Steel: 10
