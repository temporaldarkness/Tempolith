# these are what actually decides a biome's spread.
# as of 8/1/2026, these have all been placed on top of the station anchor on Colossus Central.
# TODO: make an exped prototype & autoplace it on expeditions with a higher priority than 2k
# Ring definitions (Exodus/Monolith):
# - 0-2500m from center: Внутреннее Кольцо (inner ring, static source)
# - Station GridTerritory zones (influence circles): Среднее Кольцо (middle ring, dynamically provided by spawning BiomeSourceTerritoryMiddle child entities in GridTerritorySystem)
# - Regular space (outside territories, <40km): Внешний Космос (external space, renamed from outer ring)
# - >40km: Дальние Рубежи (far reaches / distant borders, layered)
# - fallback: uncharted/default
# Static sector sources must have GlobalPvs or the client will not see them past PVS range.
# Runtime territory sources intentionally do not inherit GlobalPvs. # Exodus - territory biome perf

- type: entity
  id: BaseBiomeSource
  name: base biome source
  components:
  - type: GlobalPvs #needed so the client can see these past PVS range

- type: entity
  id: BaseLocalBiomeSource # Exodus - local source for runtime territory biomes
  name: base local biome source

- type: entity
  id: BiomeSourceFallback
  parent: BaseBiomeSource
  name: fallback biome source
  components:
  - type: SpaceBiomeSource
    id: BiomeDefault
    swapDistance: null #infinite
    priority: 1


