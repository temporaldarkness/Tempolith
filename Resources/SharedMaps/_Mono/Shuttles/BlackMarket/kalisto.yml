        Battery lifetime: +-22 minutes

        Detectable range: +-804M (recommended distance is 1.4KM)

        Time until stealth mode takes full effect: 55 seconds

        Thrust: 1 small thruster in each direction.

        Can be toggled trough the signal button or button 2 on the shuttle console.


        Main drive toggle:


        Toggles the main drive for 20 seconds, use this to quickly get away from a location WHILE in stealth mode.

        (Press eather the signal button or button 1 on the shuttle console)

        Increases ships signature to +-1.2KM


        DO NOT TOGGLE WHILE STEALTH MODE IS OFF!!


        Extra notes:


        When stealth mode is turned off, it will take up to 6 seconds for the ship to gain power again, be mindfull of it.


        Detection range while stealth mode is toggled off: 2KM


