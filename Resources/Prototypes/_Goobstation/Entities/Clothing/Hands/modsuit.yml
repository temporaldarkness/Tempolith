# Mono - modsuits cleanup - see #3733
- type: entity
  abstract: true
  parent: ClothingHandsBase
  id: ClothingModsuitGauntletsBase
  name: modsuit gauntlets
  description: Special modular suit gloves that protect wearer from electric shock.
  categories: [ HideSpawnMenu ]
  components:
  - type: Appearance
  - type: Sprite
    sprite: _Goobstation/Clothing/Hands/Modsuits/standard.rsi
    layers:
    - state: gauntlets
    - state: gauntlets-sealed
      visible: false
      map: [ "sealed" ]
  - type: Clothing
    equipSound: /Audio/Mecha/mechmove03.ogg
    unequipSound: /Audio/Mecha/mechmove03.ogg
    slots: [ gloves ]
  - type: DamageOnInteractProtection
    damageProtection:
      flatReductions:
        Heat: 10
  - type: Insulated
  - type: Fiber
    fiberMaterial: fibers-modular
    fiberColor: fibers-black
  - type: FingerprintMask
  - type: SealableClothing
    sealUpPopup: sealable-clothing-seal-up-gauntlets
    sealDownPopup: sealable-clothing-seal-down-gauntlets
  - type: SealableClothingVisuals
    spriteLayer: sealed
    clothingVisuals:
      gloves:
      - state: equipped-HAND-sealed

- type: entity
  parent: ClothingModsuitGauntletsBase
  id: ClothingModsuitGauntletsStandard
  name: standard modsuit gauntlets
  description: Special modular suit gloves that protect wearer from electric shock.
  categories: [ HideSpawnMenu ]

- type: entity
  parent: ClothingModsuitGauntletsBase
  id: ClothingModsuitGauntletsSecurity
  name: soldat modsuit gauntlets
  description: Robust modular suit gloves for gripping perps and guns tight. Equiped with a pair of 12 gauge knuckledusters.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Goobstation/Clothing/Hands/Modsuits/security.rsi
    layers:
    - state: gauntlets
    - state: gauntlets-sealed
      visible: false
      map: [ "sealed" ]
  - type: Clothing
    equipSound: /Audio/Mecha/mechmove03.ogg
    unequipSound: /Audio/Mecha/mechmove03.ogg
    slots: [ gloves ]
  - type: DamageOnInteractProtection
    damageProtection:
      flatReductions:
        Heat: 10
  - type: Gun # Mono
    fireRate: 2
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/mateba.ogg
    projectileSpeed: 65 # Mono
  - type: BallisticAmmoProvider
    whitelist:
      tags:
      - ShellShotgun12_gaugeBuckshot
    capacity: 6
    proto: ShellShotgun12_gaugeBuckshot
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
        ents: []
  - type: Insulated
  - type: Fiber
    fiberMaterial: fibers-modular
    fiberColor: fibers-black
  - type: FingerprintMask
  - type: SealableClothing
    sealUpPopup: sealable-clothing-seal-up-gauntlets
    sealDownPopup: sealable-clothing-seal-down-gauntlets
  - type: SealableClothingVisuals
    spriteLayer: sealed
    clothingVisuals:
      gloves:
      - state: equipped-HAND-sealed
      gloves-vox:
      - state: equipped-HAND-sealed-vox

- type: entity
  parent: ClothingModsuitGauntletsBase
  id: ClothingModsuitGauntletsParamedic
  name: sanitater modsuit gauntlets
  description: Black and white modular suit gloves for gripping percs and patients tight. Insulated.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Goobstation/Clothing/Hands/Modsuits/paramedic.rsi
  - type: MeleeWeapon # Mono edit
    canWideSwing: false
    autoAttack: true
    attackRate: 3
    damage:
      groups:
        Burn: -4
        Brute: -3
  - type: SealableClothingVisuals
    spriteLayer: sealed
    clothingVisuals:
      gloves:
      - state: equipped-HAND-sealed
      gloves-vox:
      - state: equipped-HAND-sealed-vox

