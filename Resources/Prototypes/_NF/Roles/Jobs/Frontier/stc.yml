    components:
    - type: NpcFactionMember # Exodus SecColossus faction
      factions:
      - SecColossus
  - !type:GiveItemOnHolidaySpecial
    holiday: FrontierBirthday
    prototype: FrontierBirthdayGift
  - !type:AddLanguageSpecial # Monolith - Languages
    languagesSpoken:
    - SolCommon
    languagesUnderstood:
    - SolCommon

- type: startingGear
  id: StcGear
  equipment:
    id: StcPDA
