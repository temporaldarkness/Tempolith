- type: vessel
  id: Vrikaash
  parent: BaseVessel
  name: VOX-Vrikaash
  description: A warship produced by a Vox Arkship using debris from a battlefield. this vessel is highly unconventional, and filled with a nitrogen atmosphere. While Vox typically treat their vessels as their Kin, this one lacks any of the organic components, as it was built to be disposable. Unlike most vessels with a sensible weapons layout or doctrine, the Vrikaash places almost all of its weapons and armor on the starboard side, focusing firepower in standoff engagements.
  price: 224000 # 130~k base marked up by 80~%
  category: medium
  group: Scrap
  access: Mercenary
  shuttlePath: /SharedMaps/_Mono/Shuttles/Scrap/vrikaash.yml
  guidebookPage: Null
  class:
  - Destroyer
  - Scrapyard
  engine:
  - Plasma

