# Shuttle Notes:
# Not for the faint of heart. Either new players buy this thing and die on it from
# a lack of air later-on, or experts get this to build on like its a child's toy.
#
# The price is deliberate. The effective cost is just below $7k. This is a bit more expensive.

- type: vessel
  id: Framework
  parent: BaseVessel
  name: Остов # Ru-Localization
  description: Самая дешёвая груда металлолома в этом секторе. Не создана для долгой жизни, но может стать кем угодно. # Ru-Localization
  price: 10000
  category: Small
  group: Shipyard
  shuttlePath: /SharedMaps/_Mono/Shuttles/framework.yml
  addComponents:
  - type: NpcFactionMember # Exodus NanoTrasen faction
    factions:
    - NanoTrasen
  guidebookPage: null
  class:
  - Civilian
  - Cargo
  engine:
  - Plasma

- type: gameMap
  id: Framework
  mapName: 'Остов' # Ru-Localization
  mapPath: /SharedMaps/_Mono/Shuttles/framework.yml
  minPlayers: 0
  stations:
    Framework:
      stationProto: StandardFrontierExpeditionVessel
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Остов{1}' # Ru-Localization
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: StationJobs
          availableJobs:
            Contractor: [ 0, 0 ]
            Pilot: [ 0, 0 ]
            Mercenary: [ 0, 0 ]
