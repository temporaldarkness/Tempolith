# Shared territory profiles for POI grids.
# GridTerritory maps only mark that a grid has territory.
# Radius/color behavior is selected here by game map / station id.
# Biome source is opt-in; static sector biome sources handle default space rings.

- type: territoryProfile
  id: PoiSmall
  radius: 1000
  minClaimRepairIntegrity: 0.65
  colorPoiByFaction: true
  neutralPoiColor: "#A6A6A6"
  gameMapPrototypes:
  - AnomalousLab
  - Bahama
  - CaseysCasino
  - CargoDepot
  - CargoDepotAlt
  - Edison
  - Grifty
  - McHobo
  - Omnichurch
  - ThePit
  - TSFMCOutpost
  - Tinnia
  - Mining

