- type: constructionGraph
  id: WallArmorAddonSolidGraph
  start: start
  graph:
  - node: start
    edges:
    - to: broken
      steps:
      - material: Steel
        amount: 4
        doAfter: 0.5
      - material: Plasteel # After economy stuff is obtainable, replace all this with economy armor plates
        amount: 4
        doAfter: 0.5
      #- tag: ArmorPlateEconomy1
