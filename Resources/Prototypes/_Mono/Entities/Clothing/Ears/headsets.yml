      - EncryptionKeyCommon
      - EncryptionKeyUssp
      - EncryptionKeyFreeport

#PDV
- type: entity
  parent: [ClothingHeadsetAlt]
  id: ClothingHeadsetAltVanguardCommand
  name: vanguard command over-ear headset
  components:
    - type: Headset
  #  - type: EncryptionKeyHolder #Mono parity with ClothingHeadset key capacity.
  #      keySlots: 5
    - type: ContainerFill
      containers:
        key_slots:
          - EncryptionKeyFreelance
