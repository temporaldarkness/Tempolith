- type: pointOfInterest
  id: TSFMCHalcyon
  parent: [BasePOI, BaseRepairablePOI]
  name: 'КВП | Флагман Фалкон' # Ru-Localization
  minimumDistance: 4500 # Mono
  maximumDistance: 5500 # Mono
  spawnGamePreset: [ NFAdventure, NFPirate, MonoStandard, MonoRogueTSF, MonoTSFUSSP, MonoADS, MonoChimera, MonoMixed, MonoAllAtOnce ]
  spawnGroup: Required
  gridPath: /Maps/_Exodus/POI/tsfmchalcyon.yml # Exodus ai-remote-borgs
  addComponents:
  - type: IFF
    color: "#047abd"
    readOnly: true
  - type: SolarPoweredGrid
    doNotCull: true

- type: gameMap
  id: TSFMCHalcyon
  mapName: 'КВП | Флагман Фалкон' # Ru-Localization
  mapPath: /Maps/_Exodus/POI/tsfmchalcyon.yml # Exodus ai-remote-borgs
  minPlayers: 0
  randomRotation: false
  stations:
    TSFMCHalcyon:
      stationProto: SecurityFrontierOutpost
      gridComponents:
      - type: VesselInfo
        description: "Законсервированный военный корабль КВП, переоборудованный в передовую оперативную базу." # Ru-Localization
      components:
        - type: StationNameSetup
          mapNameTemplate: 'КВП | Флагман Фалкон' # Ru-Localization
        - type: ExtraStationInformation
          icon:
            sprite: _NF/Structures/Decoration/banner.rsi
            state: nfsd-banner
          stationSubtext: 'frontier-lobby-nfsd-subtext'
          stationDescription: 'frontier-lobby-nfsd-description'
          lobbySortOrder: 2
        - type: StationJobs
          availableJobs:
            Sheriff: [ 1, 1 ]
            Bailiff: [1, 1 ]
            SeniorOfficer: [ 3, 3 ] # Mono
            Brigmedic: [ 2, 2 ] # Mono
            Deputy: [ -1, -1 ] # Mono
            Cadet: [ 6, 6 ] # Exodus-Cadet-Return
            TsfEngineer: [ 2, 2 ]
            TsfBorg: [ 2, 2 ]
          tags:
          - HeadOfPersonnel
          - HeadOfSecurity
        - type: StationDeadDropReporting
          messageSet: Nfsd
        - type: StationDeadDropHintExempt
