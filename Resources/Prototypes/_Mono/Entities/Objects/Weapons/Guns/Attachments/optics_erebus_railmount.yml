- type: entity
  parent: BaseGunAttachmentOptic
  id: GunAttachmentOpticErebus2x
  name: Spectre 388 2x optic (Erebus-HI railmount)
  description: Doesn't let you see as far as other optics, but helps with putting the sight back on target after recoil.
  components:
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Attachments/Optics/scopes.rsi
    state: erebus_2x
  - type: ESGunComponentAttachment
    component:
    - type: CursorOffsetRequiresWield
    - type: EyeCursorOffset
      maxOffset: 1
      pvsIncrease: 0.3
  - type: ESGunRecoilAttachment
    recoilRecoveryModifier: 2
    recoilIncreaseModifier: 1
    minSpreadModifier: 1.0
    maxSpreadModifier: 1.1
  - type: Tag
    tags:
    - MonoOptic
    - MonoOptic2x
    - MonoOpticErebusRailmount

- type: entity
