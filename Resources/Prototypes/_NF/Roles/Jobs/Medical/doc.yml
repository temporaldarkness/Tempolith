- type: job
  id: DirectorOfCare
  name: job-name-doc
  description: job-description-doc
  playTimeTracker: JobDirectorOfCare
  requirements:
  # Exodus-Rework-Time-Roles-Start
  #   - !type:OverallPlaytimeRequirement
  #     time: 162000 # mono - 45 hours
  #   - !type:DepartmentTimeRequirement
  #     department: Medical
  #     time: 72000 # mono - 20 hours
  # alternateRequirementSets: # mono
  #   longerPlaytimeLessSec: # mono
  #   - !type:OverallPlaytimeRequirement # mono
  #     time: 234000 # mono 65 hours
    - !type:RoleTimeRequirement
      role: MdMedic
      time: 54000 # 15 hours # Exodus paramed-lead-hours
    - !type:OverallPlaytimeRequirement
      time: 72000 # 20 hours
  # Exodus-Rework-Time-Roles-End
  startingGear: DocGear
  alwaysUseSpawner: true
  assignedCompany: MD
  icon: "JobIconDoc"
  salary: 15000 # Exodus-Salary
  requireAdminNotify: true
  supervisors: job-supervisors-sr # Mono
  weight: 170
  displayWeight: 60 # Second from the top # mono - first from top
  canBeAntag: false
  accessGroups:
  - AllAccessMono #Mono
  access:
  - ChiefMedicalOfficer #Mono
  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant ] # Mono - remove TSFMC implant
  - !type:AddComponentSpecial
    components:
      - type: CommandStaff
      - type: NpcFactionMember
        factions:
        - MD # mono faction
      - type: SurgerySpeedModifier
        SpeedModifier: 2
  - !type:GiveItemOnHolidaySpecial
    holiday: FrontierBirthday
    prototype: FrontierBirthdayGift
  - !type:AddLanguageSpecial # Monolith - Languages
    languagesSpoken:
    - SolCommon
    languagesUnderstood:
    - SolCommon

- type: startingGear
  id: DocGear
  equipment:
    pocket1: HypoMini
    pocket2: MedicalAppraisalTool
  storage:
    back:
    - RubberStampDoc
    - BoxFolderMedicalDoctor
    - StationAdministrationConsoleFlatpack
    - PhoneInstrumentHigh
