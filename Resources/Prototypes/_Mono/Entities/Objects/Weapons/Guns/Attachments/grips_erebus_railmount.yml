- type: entity
  parent: BaseGunAttachmentGrip
  id: GunAttachmentGripErebusLight
  name: LM-300 weapon light (Erebus-HI railmount)
  description: It's a flashlight for your gun.
  components:
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Attachments/Grips/erebus_railmount.rsi
    layers:
    - state: light
  - type: Item
    size: Small
    storedRotation: -90
  - type: ESGunRecoilAttachment
    recoilRecoveryModifier: 1.0
    recoilIncreaseModifier: 1.0
    minSpreadModifier: 1.0
    maxSpreadModifier: 1.0
  - type: ESGunComponentAttachment
    component:
    - type: ItemTogglePointLight
    - type: PointLight
      enabled: false
      mask: /Textures/Effects/LightMasks/cone.png
      autoRot: true
      radius: 6
      netsync: true
    - type: ItemToggle # No sfx because its annoying (it triggers it when u wield)
      predictable: true
      onUse: false
      onAltUse: false
  - type: Tag
    tags:
    - MonoGrip
    - MonoGripErebusRailmount
    - MonoGripLight
