# Exodus: PDV uplink ID card section.
# Lets PDV crew (e.g. life-insurance clones who respawn without gear) buy a
# rank ID card. Restricted to the PDV uplink via the FactionStaticUplinkPdv tag.
# Grand Vizier card is intentionally excluded.

- type: storeCategory
  id: UplinkPdvIdCards
  name: store-category-pdvidcards

- type: listing
  id: UplinkPdvIdCardRakhshan
  name: uplink-pdv-idcard-rakhshan-name
  description: uplink-pdv-idcard-rakhshan-desc
  productEntity: PDVRakhshanIDCard
  cost:
    Doubloon: 1
  categories:
  - UplinkPdvIdCards
  conditions:
  - !type:StoreWhitelistCondition
    whitelist:
      tags:
      - FactionStaticUplinkPdv

