#LPC base (just different sprites)
- type: entity
  abstract: true
  parent: BaseShipVoucher
  id: BaseShipLPCOneUse
  name: ship LPC
  description: Contains the necessary data for a shipyard console to produce a certain design.
  components:
  - type: Sprite
    sprite: _Mono/Objects/Misc/lpcnew.rsi # Exodus-Fix
    state: icon
  - type: ShipyardVoucher
    destroyOnEmpty: true
    cooldown: 1800 # thirty minutes

- type: entity
  abstract: true
  parent: BaseShipLPCOneUse
  id: BaseShipLPCRenewable
  name: ship LPC
  description: Contains the necessary data for a shipyard console to produce a certain design.
  components:
  - type: Sprite
    sprite: _Mono/Objects/Misc/lpcnew.rsi # Exodus-Fix
    state: icon
  - type: ShipyardVoucher
    redemptionsLeft: 12 # Lowest cooldown is half an hour. It's unlikely it'll be met, but hey.
    destroyOnEmpty: false

#Ironman Voucher
- type: entity
  parent: BaseShipLPCOneUse
  id: ShipVoucherFrontierIronMan
  name: Ironman LPC
  description: Allows purchase of one free Baeg or Framework from the Shipyard. Destroyed on sale.
  components:
  - type: Sprite
    sprite: _Mono/Objects/Misc/lpcnew.rsi
    layers:
    - state: icon_fighter
    - state: screen
      color: "#e68e00"
    - state: screen6
      color: "#e68e00"
      shader: unshaded
  - type: ShipyardVoucher
    vessels:
    - Baeg
    - Framework
    consoleType: Shipyard
    destroyOnEmpty: true

