# region INTERACTION TAG
# Как одежда закрывает/не закрывает ту или иную область тела
- type: Tag
  id: CommandSuit

# face
# Лицо закрыто
- type: Tag
  id: FaceCovered

# head
# Голова полностью закрыта (например шлемом скафандра, капюшоном)
- type: Tag
  id: FullCovered

# jumpsuit
# Открыто снизу (например юбки)
- type: Tag
  id: NudeBottom

# jumpsuit
# Всё открыто (например фартук)
- type: Tag
  id: NudeFull

# jumpsuit
# Открыто сверху (например боксёрские шорты)
- type: Tag
  id: NudeTop

# neck
# Открыта шея (например бейджики, пины)
- type: Tag
  id: OpenNeck

# gloves
# Гладкие перчатки (например медицинские)
- type: Tag
  id: SmoothGloves

# добавляет вещь в чёрный список ксеноморфов
- type: Tag
  id: NoXeno

# head
# Закрыто только сверху (шляпы, кепки)
- type: Tag
  id: TopCovered

# head
# обозначает вещь, как твёрдый шлем
- type: Tag
  id: Helmet
