# Exodus : Gunnery Server
- type: entity
  id: GunneryServerSuper
  parent: [BaseStructureDisableToolUse, GunneryServerBase]
  name: super-high-power gunnery control server
  components:
  - type: Machine
    board: MachineGCSSuperCircuitboard
  - type: FireControlServer
    processingPower: 120
  - type: Battery
    maxCharge: 1250
    startingCharge: 1250
  - type: ApcPowerReceiver
    powerLoad: 2500
  - type: ApcPowerReceiverBattery
    idleLoad: 60
    batteryRechargeRate: 3000
    batteryRechargeEfficiency: 0.95
  - type: Anchorable
    flags: Anchorable
  - type: ShipRepairable
    repairTime: 30
    repairCost: 115

- type: entity
  id: GunneryServerAlfa
  parent: [BaseStructureDisableToolUse, GunneryServerBase]
  name: alfa-high-power gunnery control server
  components:
  - type: Machine
    board: MachineGCSAlfaCircuitboard
  - type: FireControlServer
    processingPower: 200
  - type: Battery
    maxCharge: 2000
    startingCharge: 2000
  - type: ApcPowerReceiver
    powerLoad: 4000
  - type: ApcPowerReceiverBattery
    idleLoad: 100
    batteryRechargeRate: 4800
    batteryRechargeEfficiency: 0.95
  - type: Anchorable # Sorry Flyssa, but I am NOT risking this being used for a missile bus.
    flags: Anchorable
  - type: ShipRepairable
    repairTime: 40
    repairCost: 150
