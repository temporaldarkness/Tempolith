- type: vessel
  id: Garm
  parent: BaseVesselAntag
  name: WEN Garm
  description: Gruff hull with 3 GPOL's and long-range Bofors artillery for station bombardments and fleet support.
  price: 105200 # 86700 appraisegrid
  purchasable: false # voucher only
  category: Medium
  group: BlackMarket
  access: Pirate
  shuttlePath: /SharedMaps/_Mono/Shuttles/BlackMarket/garm.yml
  addComponents: # Exodus faction-owned shuttle target filtering
  - type: NpcFactionMember
    factions:
    - PirateNF
  guidebookPage: Null
  class:
  - Pirate
  engine:
  - Uranium

- type: gameMap
  id: Garm
  mapName: 'WEN Garm'
  mapPath: /SharedMaps/_Mono/Shuttles/BlackMarket/garm.yml
  minPlayers: 0
  stations:
    Garm:
      stationProto: StandardFrontierVessel
      gridComponents:
      - type: VesselInfo
        description: "Old cargo hull, now carries heavy bombardment arnament, capable of sending stations back to the Stone Age."
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Garm PDV{1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: StationJobs
          availableJobs:
            Pirate: [ 0, 0 ]
            PdvBorg: [ 0, 0 ]
